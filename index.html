<!-- ASL_TechSupport_v15 · 30 May 2026 · SABENA Technics MRO · ATR 72-600 -->
<!-- 10 modules: Dashboard · Aircraft · WO · ATL · HIL · Historial · Contactos · Email · Reports · Scheduler -->

<style>
:root {
  --asl-navy: #003566;
  --asl-blue: #004e9a;
  --asl-mid: #0066cc;
  --asl-accent: #ffd60a;
  --asl-orange: #ffc300;
  --asl-light: #cce0f5;
  --asl-white: #f4f8fc;
  --asl-grey: #7a8fa8;
  --asl-dark: #001d3d;
  --asl-success: #1db87a;
  --asl-danger: #e03e3e;
  --asl-warn: #e8a020;
  --asl-diff: #8b5cf6;
  --sidebar-w: 200px;
  --font-main: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-main);
  background: var(--asl-navy);
  color: var(--asl-white);
  min-height: 100vh;
  font-size: 13px;
}

/* ══ LOGIN ══ */
#login-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, var(--asl-dark) 0%, var(--asl-navy) 50%, #0d2147 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.login-bg-stripe {
  position: absolute; top: 0; left: 0; width: 100%; height: 6px;
  background: linear-gradient(90deg, var(--asl-orange), var(--asl-accent), var(--asl-mid));
}
.login-box {
  background: rgba(10,22,40,0.95);
  border: 1px solid rgba(232,160,32,0.3);
  border-radius: 12px;
  padding: 48px 40px 40px;
  width: 380px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  position: relative;
}
.login-logo {
  text-align: center; margin-bottom: 32px;
}
.logo-svg { width: 200px; height: 70px; }
.login-subtitle {
  text-align: center; color: var(--asl-grey); font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px;
  border-top: 1px solid rgba(255,255,255,0.08); padding-top: 16px;
}
.login-field { margin-bottom: 16px; }
.login-field label {
  display: block; font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--asl-grey); margin-bottom: 6px;
}
.login-field input {
  width: 100%; padding: 11px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; color: var(--asl-white);
  font-size: 16px; font-family: var(--font-main);
  transition: border-color .2s;
}
.login-field input:focus {
  outline: none; border-color: var(--asl-accent);
  background: rgba(232,160,32,0.05);
}
.login-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(90deg, var(--asl-orange), var(--asl-accent));
  border: none; border-radius: 6px; color: #fff;
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; cursor: pointer; margin-top: 8px;
  transition: opacity .2s, transform .1s;
}
.login-btn:hover { opacity: .9; transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); }
.login-error {
  color: var(--asl-danger); font-size: 11px;
  text-align: center; margin-top: 10px; display: none;
}

/* ══ APP SHELL ══ */
#app { display: none; height: 100vh; flex-direction: column; }

/* Top bar */
#topbar {
  height: 48px; background: var(--asl-dark);
  border-bottom: 2px solid var(--asl-accent);
  display: flex; align-items: center; padding: 0 20px;
  gap: 16px; flex-shrink: 0;
}
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-logo svg { width: 120px; height: 30px; }
.topbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.1); }
.topbar-title {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-grey);
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.topbar-user {
  font-size: 11px; color: var(--asl-accent); letter-spacing: 1px;
  text-transform: uppercase;
}
.topbar-time { font-size: 11px; color: var(--asl-grey); font-variant-numeric: tabular-nums; }
.btn-logout {
  padding: 5px 12px; border: 1px solid rgba(255,255,255,0.15);
  background: transparent; color: var(--asl-grey);
  border-radius: 4px; cursor: pointer; font-size: 11px;
  transition: all .2s;
}
.btn-logout:hover { border-color: var(--asl-danger); color: var(--asl-danger); }

/* Main layout */
#main-layout { display: flex; flex: 1; overflow: hidden; }

/* ══ SIDEBAR ══ */
#sidebar {
  width: var(--sidebar-w); background: var(--asl-dark);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column; flex-shrink: 0;
  padding-top: 8px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 18px; cursor: pointer; color: var(--asl-grey);
  font-size: 12px; letter-spacing: .5px; border-left: 3px solid transparent;
  transition: all .15s; user-select: none;
}
.nav-item:hover { color: var(--asl-white); background: rgba(255,255,255,0.04); }
.nav-item.active {
  color: var(--asl-accent); border-left-color: var(--asl-accent);
  background: rgba(232,160,32,0.07);
}
.nav-icon { font-size: 15px; width: 18px; text-align: center; }
.nav-separator { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 16px; }

/* ══ CONTENT AREA ══ */
#content { flex: 1; overflow-y: auto; padding: 20px; background: #0d1e35; }

/* ══ DASHBOARD ══ */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 16px;
}
.dash-card {
  background: var(--asl-navy);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 16px;
  position: relative; overflow: hidden;
}
.dash-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.dash-card.aog::before { background: var(--asl-danger); }
.dash-card.hil::before { background: var(--asl-diff); }
.dash-card.wo::before { background: var(--asl-warn); }
.dash-card.atl::before { background: var(--asl-mid); }
.dash-card.notes::before { background: var(--asl-success); }
.dash-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.dash-card-title {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-grey);
}
.dash-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700;
}
.badge-danger { background: rgba(224,62,62,.2); color: var(--asl-danger); }
.badge-warn { background: rgba(232,160,32,.2); color: var(--asl-warn); }
.badge-diff { background: rgba(139,92,246,.2); color: var(--asl-diff); }
.badge-blue { background: rgba(30,77,140,.4); color: var(--asl-light); }
.badge-success { background: rgba(29,184,122,.2); color: var(--asl-success); }

.dash-card.notes { grid-column: span 3; }

.dash-item {
  padding: 8px 10px; background: rgba(255,255,255,0.03);
  border-radius: 6px; margin-bottom: 6px;
  cursor: pointer; transition: background .15s;
  border-left: 2px solid transparent;
}
.dash-item:hover { background: rgba(255,255,255,0.07); }
.dash-item.aog-item { border-left-color: var(--asl-danger); }
.dash-item.hil-item { border-left-color: var(--asl-diff); }
.dash-item.wo-item { border-left-color: var(--asl-warn); }
.dash-item.atl-item { border-left-color: var(--asl-mid); }
.dash-item-reg {
  font-size: 11px; font-weight: 700; color: var(--asl-accent);
  margin-bottom: 2px;
}
.dash-item-title { font-size: 11px; color: var(--asl-white); margin-bottom: 2px; }
.dash-item-meta { font-size: 10px; color: var(--asl-grey); }

.empty-state {
  text-align: center; padding: 20px; color: var(--asl-grey); font-size: 11px;
}

/* Notes area */
.notes-area {
  width: 100%; background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
  color: var(--asl-white); padding: 10px; font-size: 12px;
  font-family: var(--font-main); resize: vertical; min-height: 80px;
}
.notes-area:focus { outline: none; border-color: var(--asl-accent); }
.btn-save-note {
  margin-top: 8px; padding: 6px 16px;
  background: var(--asl-success); border: none; border-radius: 4px;
  color: #fff; font-size: 11px; font-weight: 700; cursor: pointer;
}

/* ══ MODULE VIEWS ══ */
.module-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.module-title {
  font-size: 18px; font-weight: 700; color: var(--asl-white);
  letter-spacing: .5px;
}
.module-subtitle { font-size: 11px; color: var(--asl-grey); margin-top: 2px; }

.btn-primary {
  padding: 8px 18px; background: linear-gradient(90deg, var(--asl-orange), var(--asl-accent));
  border: none; border-radius: 6px; color: #fff;
  font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: .5px;
  transition: opacity .2s;
}
.btn-primary:hover { opacity: .85; }
.btn-sm {
  padding: 4px 10px; border-radius: 4px; font-size: 11px;
  font-weight: 600; cursor: pointer; border: none; transition: opacity .2s;
}
.btn-sm:hover { opacity: .8; }
.btn-edit { background: rgba(30,77,140,.5); color: var(--asl-light); }
.btn-del { background: rgba(224,62,62,.3); color: #ff8080; }
.btn-view { background: rgba(29,184,122,.2); color: var(--asl-success); }

/* Table */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 10px 12px; font-size: 10px;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--asl-grey);
  border-bottom: 1px solid rgba(255,255,255,0.08); white-space: nowrap;
}
.data-table td {
  padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 12px; vertical-align: middle;
}
.data-table tr:hover td { background: rgba(255,255,255,0.02); }

.reg-tag {
  display: inline-block; padding: 2px 8px;
  background: rgba(232,160,32,0.15); color: var(--asl-accent);
  border-radius: 4px; font-size: 11px; font-weight: 700;
}
.status-tag {
  display: inline-block; padding: 2px 9px;
  border-radius: 10px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px;
}
.s-open { background: rgba(29,184,122,.15); color: var(--asl-success); }
.s-closed { background: rgba(138,155,181,.15); color: var(--asl-grey); }
.s-deferred { background: rgba(139,92,246,.2); color: var(--asl-diff); }
.s-aog { background: rgba(224,62,62,.2); color: var(--asl-danger); }

/* ══ MODAL ══ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal-box {
  background: #0d1e35; border: 1px solid rgba(232,160,32,0.3);
  border-radius: 12px; padding: 28px; width: 100%; max-width: 720px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,0.8);
}
.modal-title {
  font-size: 16px; font-weight: 700; margin-bottom: 20px;
  padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-close {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.07); border: none;
  color: var(--asl-grey); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: rgba(224,62,62,.3); color: #fff; }

/* Form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid.cols-1 { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: span 2; }
.form-group label {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--asl-grey);
}
.form-group input,
.form-group select,
.form-group textarea {
  padding: 9px 12px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
  color: var(--asl-white); font-size: 16px; font-family: var(--font-main);
  transition: border-color .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none; border-color: var(--asl-accent);
}
.form-group select option { background: #0d1e35; }
.form-group textarea { resize: vertical; min-height: 72px; }

.form-actions {
  display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;
}
.btn-cancel {
  padding: 8px 18px; background: transparent;
  border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
  color: var(--asl-grey); font-size: 12px; cursor: pointer;
}
.btn-cancel:hover { border-color: var(--asl-grey); }

/* Signature */
.sig-btn {
  padding: 8px 16px; background: rgba(255,255,255,0.05);
  border: 1px dashed rgba(232,160,32,0.4); border-radius: 6px;
  color: var(--asl-accent); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; gap: 8px;
}
.sig-applied {
  color: var(--asl-success); border-color: rgba(29,184,122,.4);
  background: rgba(29,184,122,.05);
}

/* Detail view */
.detail-section {
  background: var(--asl-navy); border-radius: 8px;
  padding: 16px; margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.06);
}
.detail-section-title {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-accent); margin-bottom: 12px;
}
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.detail-item label {
  display: block; font-size: 10px; color: var(--asl-grey);
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px;
}
.detail-item .val {
  font-size: 12px; color: var(--asl-white); line-height: 1.5;
}

/* HIL deadline colors */
.deadline-urgent { color: var(--asl-danger); font-weight: 700; }
.deadline-warn { color: var(--asl-warn); font-weight: 700; }
.deadline-ok { color: var(--asl-success); }

/* Contacts */
.contacts-section { margin-bottom: 28px; }
.contacts-title {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-accent); margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid rgba(232,160,32,0.2);
}
.contact-card {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 14px; background: var(--asl-navy);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
  margin-bottom: 8px;
}
.contact-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--asl-mid), var(--asl-accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.contact-name { font-size: 13px; font-weight: 600; }
.contact-role { font-size: 11px; color: var(--asl-grey); }
.contact-phone { margin-left: auto; color: var(--asl-accent); font-size: 12px; font-variant-numeric: tabular-nums; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9000;
  padding: 12px 20px; border-radius: 8px; font-size: 13px;
  font-weight: 600; opacity: 0; transform: translateY(10px);
  transition: all .3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--asl-success); color: #fff; }
.toast.error { background: var(--asl-danger); color: #fff; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

/* Filter bar */
.filter-bar {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  align-items: center;
}
.filter-btn {
  padding: 5px 14px; border-radius: 20px; font-size: 11px;
  font-weight: 600; cursor: pointer; border: 1px solid transparent;
  transition: all .15s; background: rgba(255,255,255,0.05);
  color: var(--asl-grey);
}
.filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--asl-white); }
.filter-btn.active { background: rgba(232,160,32,0.15); border-color: var(--asl-accent); color: var(--asl-accent); }
.filter-search {
  padding: 5px 12px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
  color: var(--asl-white); font-size: 12px; width: 200px;
}
.filter-search:focus { outline: none; border-color: var(--asl-accent); }

/* Historial */
.hist-card {
  background: var(--asl-navy); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px; margin-bottom: 12px; overflow: hidden;
}
.hist-header {
  padding: 12px 16px; background: rgba(255,255,255,0.03);
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.hist-body { padding: 16px; display: none; }
.hist-body.open { display: block; }
.hist-field { margin-bottom: 10px; }
.hist-field label {
  font-size: 10px; color: var(--asl-grey); letter-spacing: 1px;
  text-transform: uppercase; display: block; margin-bottom: 3px;
}
.hist-field .val { font-size: 12px; line-height: 1.6; }
.hist-manual {
  background: rgba(30,77,140,.2); border: 1px solid rgba(30,77,140,.4);
  border-radius: 6px; padding: 10px 14px; margin-top: 8px;
}
.hist-manual-title {
  font-size: 10px; color: var(--asl-accent); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 6px;
}

@media (max-width: 900px) {
  .dashboard-grid { grid-template-columns: 1fr 1fr; }
  .dash-card.notes { grid-column: span 2; }
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: span 1; }
}
@media (max-width: 600px) {
  :root { --sidebar-w: 48px; }
  #sidebar { width: 48px; overflow: hidden; }
  .nav-item { padding: 13px 0; justify-content: center; }
  .nav-item span.nav-label { display: none; }
  .nav-icon { font-size: 18px; width: auto; }
  .nav-separator { margin: 6px 8px; }
  #content { padding: 12px; }
  .dashboard-grid { grid-template-columns: 1fr; gap: 12px; }
  .dash-card.notes { grid-column: span 1; }
  .module-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .module-title { font-size: 15px; }
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: span 1; }
  .modal-box { padding: 18px; }
  .detail-grid { grid-template-columns: 1fr; }
  .data-table th, .data-table td { padding: 8px 8px; font-size: 11px; }
  .topbar-title { display: none; }
  .topbar-time { display: none; }
  #topbar { padding: 0 12px; }
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">

<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-bg-stripe"></div>

    { id:3, wo_number:'319047', ata:'21-26', title:'Avionics Bay Cooling Fan Replacement', defect:'Avionics bay cooling fan #2 (P/N 21-26-08) inoperative – seized bearing.', corrective_action:'Removed fan unit per AMM 21-26-08 Rev 12. Installed new fan P/N 21-26-08A s/n 00349. Electrical connections verified per SID 21.048. Operational test performed: airflow measured 120 CFM (min 100 CFM per limits). BITE clear.', engineer:'P. Slomas', signature:'PaMCC26', wp_reference:'WP-ATR-0021-008', aircraft_reg:'5H-PCK', created_at:'2026-06-21', closed_at:'2026-06-21', status:'closed' },
    { id:4, wo_number:'581736', ata:'34-11', title:'ILS Localizer – VOR/LOC Discrepancy', defect:'Crew reported LOC needle off-centre by 2 dots compared to captain side during ILS approach BRU RWY25L.', corrective_action:'Tested ILS per AMM 34-11-10. FO side signal cable J34-11-B2 found micro-fractured at connector. Replaced RG-400 coax segment (1.2m). Re-tested: CRS error <0.1 dot. Avionics release per CAME 34-BITE-04.', engineer:'P. Slomas', signature:'PaMCC26', wp_reference:'WP-ATR-0034-011', aircraft_reg:'5H-PWA', created_at:'2026-06-22', closed_at:'2026-06-22', status:'closed' },
    { id:5, wo_number:'204813', ata:'24-21', title:'IDG #1 Oil Level Low', defect:'ECAM advisory IDG 1 OIL LO on departure BRU. Oil level confirmed below MIN mark on sight glass.', corrective_action:'Serviced IDG #1 with MIL-PRF-7808L oil per AMM 24-21-12. Added 0.4 qt to bring level to MAX mark. Checked for leaks: none found. Engine run performed, IDG advisory clear after 3 min. CRS issued.', engineer:'P. Slomas', signature:'PaMCC26', wp_reference:'WP-ATR-0024-021', aircraft_reg:'5H-PTJ', created_at:'2026-06-23', closed_at:'2026-06-23', status:'closed' },
    { id:6, wo_number:'937462', ata:'27-21', title:'Aileron Control Cable – Tension Adjustment', defect:'Aileron rigging check during C-Check revealed LH aileron cable tension at 43 lb (limit 55–75 lb).', corrective_action:'Re-rigged aileron control system per AMM 27-21-03. Cable tension adjusted to 65 lb (within 55–75 lb limit). Turnbuckle lock-wired per standard. Full travel check: UP 25° / DN 15° – within tolerance. Duplicate inspection completed.', engineer:'P. Slomas', signature:'PaMCC26', wp_reference:'WP-ATR-0027-003', aircraft_reg:'5H-PCK', created_at:'2026-06-24', closed_at:'2026-06-24', status:'closed' },
    { id:7, wo_number:'645290', ata:'52-10', title:'FWD Cargo Door – Seal Replacement', defect:'Air leak detected at FWD cargo door upper seal during pressurisation check. Leak rate 2.4 lb/min (limit <1.0 lb/min).', corrective_action:'Removed and replaced door perimeter seal P/N ATR52-10-SEA-02 per AMM 52-10-07. Door adjusted: clearance gap 2 mm uniform (limit 1.5–3 mm). Pressurisation check repeated: leak rate 0.3 lb/min – within limits.', engineer:'P. Slomas', signature:'PaMCC26', wp_reference:'WP-ATR-0052-010', aircraft_reg:'5H-PWA', created_at:'2026-06-25', closed_at:'2026-06-25', status:'closed' },
    { id:8, wo_number:'158374', ata:'79-21', title:'Oil Cooler – Engine #2 Blockage', defect:'ENG 2 OIL TEMP ECAM advisory during climb. Oil temp reached 155°C (max 145°C normal ops).', corrective_action:'Removed oil cooler P/N ATR79-21-OC per AMM 79-21-10. Flushed cooler with Turco 4338-L solvent. Core partially blocked (estimated 30%). Blockage cleared. Reinstalled with new gaskets. Post-engine run: oil temp 118°C at cruise power – within normal range.', engineer:'P. Slomas', signature:'PaMCC26', wp_reference:'WP-ATR-0079-021', aircraft_reg:'5H-PTJ', created_at:'2026-06-26', closed_at:'2026-06-26', status:'closed' },
    { id:9, wo_number:'523011', ata:'52-30', title:'FWD Cargo Door Seal R&R – Pack 1 Root Cause', defect:'Recurring PACK 1 FAULT in cruise (outlet 115°C, TCV 1 fully open) persisting after TCV 1 replacement. Night inspection found FWD cargo door perimeter seal worn (12 cm lower left quadrant, hardness >90 Shore A vs 85 limit) with salt crystal deposits on actuator rod seal — evidence of marine air infiltration during pressurisation. Root cause of Pack 1 fault: cold air infiltration via failed door seal, not TCV. ATA 52-31 seal warning advisory stored in BITE.', corrective_action:'FWD cargo door seal removed and replaced per AMM 52-30-11. Wear confirmed: 12 cm section lower left quadrant, elevated hardness, abrasion pattern from repetitive pressurisation loading. Actuator rod seal area cleaned (salt deposits), shaft undamaged. New seal installed, torque sequence completed. Pressurisation ground leak check per AMM 52-30-00: differential 4.5 psi, no audible leak, no smoke dispersion, door periphery sealed – PASS. Pack 1 ground functional check: outlet 76°C (vs 115°C in flight), TCV 1 modulating 40-60% normally, no ECAM – PASS. Engineering approved task; TCV 1 left installed (serviceable). Engineering monitoring instruction issued for green hydraulic pump case drain temp trend (71°C avg → 78°C, limit 85°C) – borescope and load test scheduled at next A-check.', engineer:'P. Slomas', signature:'PaMCC26', wp_reference:'WP-ATR-0052-030', aircraft_reg:'5H-PAA', created_at:'2026-06-26', closed_at:'2026-06-26', status:'closed' },
    { id:10, wo_number:'774120', ata:'24-30', title:'No.2 DC Generator / GCU - Investigation & R&R', defect:'Recurring intermittent No.2 DC generator trip in cruise (ref ATL-882013, HIL-553240). GEN 2 BITE indicates GCU control/regulation channel fault re-arming on reset. Four occurrences in one week; not resolved by line resets.', corrective_action:'IN PROGRESS - Investigation per TSM 24-30-00: download GEN 2 GCU BITE history, inspect GEN 2 feeder and GCU connectors for intermittent open, perform generator output and regulation check. Plan: replace GCU (P/N 24-30-GCU) and re-test; if fault persists, replace No.2 DC starter/generator per AMM 24-30-11. Functional and load test required before closure; verification by monitored sector.', engineer:'P. Slomas', signature:'', wp_reference:'WP-ATR-0024-030', aircraft_reg:'5H-PWA', created_at:'2026-07-01', closed_at:'', status:'open' },
  ],
  atl: [
    { id:1, atl_number:'ATL-881203', pilot_report:'Landing gear warning light intermittent during transit BRU-CDG. GEAR UNSAFE indication 3 sec after gear up selection, then normal.', certifying_action:'Inspected micro-switch on LH MLG uplatch per AMM 32-60-05. Found micro-switch gap 0.9 mm (limit 0.3–0.7 mm). Adjusted to 0.5 mm. Functional test: 5 cycles, no fault. BITE clear.', crs:'CRS issued: Work carried out in accordance with AMM 32-60-05 Rev 14. Aircraft released to service by authorised certifying staff. AME Lic B1.1 – EASA.145.0419.', aircraft_reg:'5H-PWA', created_at:'2026-06-20', status:'closed' },
    { id:2, atl_number:'ATL-334751', pilot_report:'ANTI SKID FAULT ECAM message during landing roll BRU. Braking felt normal.', certifying_action:'Tested anti-skid system per TSM 32-43-00. BITE identified fault on WHL 3 speed transducer. Replaced transducer P/N 32-43-T3 per AMM 32-43-04. System test: all channels normal.', crs:'CRS issued: Work carried out per AMM 32-43-04 Rev 9. Aircraft released to service. AME Lic B1.1 – EASA.145.0419.', aircraft_reg:'5H-PTJ', created_at:'2026-06-20', status:'closed' },
    { id:3, atl_number:'ATL-509617', pilot_report:'Slight vibration felt in rudder pedals above 200 KIAS during climb.', certifying_action:'Inspected rudder mechanical system per AMM 27-31-00. Found aft rudder pushrod rod-end bearing worn (axial play 1.1 mm, limit 0.8 mm). Replaced bearing per AMM 27-31-12. Rigging check satisfactory.', crs:'CRS issued: Work per AMM 27-31-12 Rev 7. Aircraft released. AME Lic B1.1 – EASA.145.0419.', aircraft_reg:'5H-PCK', created_at:'2026-06-21', status:'open' },
    { id:4, atl_number:'ATL-294017', pilot_report:'GREEN HYD LO PR ECAM in cruise FL180, approx 4 min, pressure dropped to 1,950 psi (ECAM limit 2,000 psi), spontaneous recovery to 2,850 psi on descent. Crew applied QRH 29-11.', certifying_action:'Ground check post-flight: green hydraulic 3,000 psi, no visible leaks, level correct. BITE: no stored faults ATA 29. Green hydraulic pump case drain temp 78°C (limit 85°C) — upper range. Trend reviewed with Engineering: 10-sector avg 71°C, last three 74-76-78°C (gradual rise, within limits). No fault codes, no delta-P abnormality, no fluid loss. Assessed as early pump wear / transient event, not structural leak. No immediate replacement — monitoring per Engineering instruction, borescope + load test at next A-check.', crs:'Deferred to HIL for monitoring. Engineering monitoring instruction issued. Not a release blocker. AME Lic B1.1 – EASA.145.0419.', aircraft_reg:'5H-PAA', created_at:'2026-06-22', status:'closed' },
    { id:5, atl_number:'ATL-417603', pilot_report:'PACK 1 FAULT ECAM in cruise FL160, OAT -18°C. Pack 1 outlet 115°C (limit 100°C), TCV 1 fully open, bleed normal. Auto-switchover to pack 2. Fault cleared on descent. Recurring — TCV 1 previously replaced by prior tech, fault reappeared next sector.', certifying_action:'ACMS review: Pack 1 outlet 115°C, TCV 1 fully open, Eng 1 bleed nominal 46 psi. Ground check: Pack 1 outlet 78°C, TCV 1 stroke test PASS, bleed normal. Cruise-only pattern + ineffective TCV replacement indicated external cause. Correlated with stored ATA 52-31 cargo door seal advisory. Root cause identified: failed FWD cargo door seal causing cold air infiltration to pack inlet under pressurisation. Corrected via WO 523011 (AMM 52-30-11 seal R&R). Post-fix Pack 1 ground functional: outlet 76°C, TCV modulating 40-60% normally, no ECAM.', crs:'CRS issued: Root cause corrected per AMM 52-30-11 (ref WO 523011). Pack 1 functional check satisfactory. Aircraft released to service. AME Lic B1.1 – EASA.145.0419.', aircraft_reg:'5H-PAA', created_at:'2026-06-24', status:'closed' },
    { id:6, atl_number:'ATL-602714', pilot_report:'Telephone call from Capt. Yusuf Hamisi (5H-PTJ, sector LPA-TFN), cruise FL170, 10:27Z. Reported a cascade of unrelated CCAS cautions over approx 3 min: first AUTO-FEATHER caution with master caution, then a spurious A-ICE (airframe de-ice) fault with no icing present (OAT +9C, dry air), then a FUEL crossfeed advisory and an EFIS reconfiguration on the FO side. AP self-disconnected once with no input. No system genuinely degraded - boots not commanded, fuel balanced, both engines and PEC nominal. Multiple simultaneous, non-corroborated cautions pointed to a Multifunction Computer (MFC 1) processing fault rather than real failures. Captain requested Technical Support assessment before continuing.', certifying_action:'Assessment: MFC 1 latch-up. The MFC generates and routes CCAS cautions and hosts anti-ice, fuel and lighting logic, so a single MFC processor fault presents as multiple unrelated cautions with no real system degradation (TSM 31-50-00 / 31-52). Confirmed with crew that every flagged system was physically nominal: no boot inflation, fuel balanced, both PEC and engine parameters normal, no genuine AP malfunction beyond the single nuisance disconnect. Advised crew to apply the FCOM/QRH MFC 1 RESET (MFC 1 P/B OFF 10 s then ON) per QRH 31. Post-reset at 10:58Z all spurious cautions cleared, FO EFIS reconfigured to normal, AP re-engaged and held with no recurrence through to landing at 11:14Z. Single in-flight nuisance reset within FCOM provisions; no MEL item applicable as no system is dispatch-affected. Ground task raised: download MFC 1 BITE on arrival and, if a hard fault code is latched, replace MFC 1 module per AMM 31-52-11. Aircraft assessed serviceable to continue.', crs:'Cleared for continued operation. Spurious CCAS cautions traced to MFC 1 processing fault; resolved by FCOM/QRH MFC 1 reset (ref QRH 31, TSM 31-50-00). All systems confirmed physically nominal in flight. No MEL item applicable. Ground MFC 1 BITE download / module assessment raised for arrival. AME Lic B1.1 - EASA.145.0419.', aircraft_reg:'5H-PTJ', created_at:'2026-06-25', status:'closed' },
    { id:7, atl_number:'ATL-715388', pilot_report:'Telephone call from Hassan Said (onboard certifying staff) during turnaround at LPA, 11:29Z. Two items raised on 5H-PCK (sector TFN-LPA). PROBLEM 1 (annotated by Capt. Yusuf Hamisi): AFCS - repeated uncommanded autopilot pitch disconnects with FD bar removal during climb between FL120 and FL180 (3 occurrences). AP re-engaged each time; remainder of climb flown manually then re-coupled in cruise without further event. No trim runaway, pitch control normal throughout. PROBLEM 2 (pending Technical Support disposition): YAW DAMPER FAULT ECAM in cruise FL180, latched; YD would not re-arm after recycle. Mild Dutch-roll tendency reported with YD off. Hassan Said requested Technical Support determination and MEL position before the next sector.', certifying_action:'PROBLEM 1 - AFCS pitch disconnects: reviewed with crew and AFCS BITE (TSM 22-10-00). Disconnects confined to the FL120-FL180 band with FD bars removed at each event = AFCS monitor trip, not a servo runaway. No stored hard fault, pitch trim and elevator nominal, no recurrence in cruise. Assessed as an intermittent AFCS pitch-channel monitor trip (known transient). AFCS/FDS reset performed on ground per AMM 22-10-12, BITE re-run clear. No dispatch-affecting fault; pitch-channel functional check satisfactory. Item closed - monitor; if recurrence, replace AFCS computer per AMM 22-10-14. PROBLEM 2 - Yaw Damper fault: interrogated YD per TSM 22-20-00. BITE latched a genuine YD computer channel fault (rate-gyro input fail) and YD would not re-arm = real failure, not nuisance. Yaw damper cannot be restored at line. Resolved per MEL 22-20-01 (Cat C): dispatch permitted with Yaw Damper inoperative provided (i) crew briefed that Dutch-roll damping is lost and manual rudder coordination is required, (ii) operation in moderate or greater turbulence avoided where practicable, (iii) autopilot remains available for normal ops. YD selected OFF and collared, INOP placard fitted. Deferred to HIL (HIL-448120) for YD computer replacement P/N 22-20-YDC, MEL Cat C interval max 10 days. Aircraft released to service under MEL at 12:42Z.', crs:'Released to service. PROBLEM 1 (AFCS pitch disconnects) assessed as intermittent monitor trip; AFCS/FDS reset per AMM 22-10-12, BITE clear, no dispatch fault - monitor. PROBLEM 2 (Yaw Damper fault) confirmed genuine YD channel failure per TSM 22-20-00; dispatched per MEL 22-20-01 Cat C with YD inoperative, placarded and collared, deferred to HIL-448120 for YD computer R&R (max 10 days). AME Lic B1.1 - EASA.145.0419.', aircraft_reg:'5H-PCK', created_at:'2026-06-26', status:'closed' },
    { id:8, atl_number:'ATL-741134', pilot_report:'D1: YD INHIBIT APPEARS ON EICAS.', certifying_action:'OPT IAW AMM ATA OPT 22-26-0002-320-A-A ref. 01Jun26 was performed. Test satisfactory. ASFC is still being monitored. The message did not appear on the screen. Two hops remain to complete the route. Perform AFCS functional and operational checks before landing and on the ground. Upload results to the portal. Documentation is attached to this WO via the portal. TX to HIL by monitoring is required for 5 days. N\u00b0HIL: HIL-117954 - NOTE 01: The WO will be closed when the route is finished and all the data has been collected. The aircraft is good condition to fly as there are no visible faults or annotations. In accordance with TSM 22-28, monitoring is required for 5 days. Documentation has been provided to the pilots and the onboard certifier. >>> IMPORTANT <<< Be aware of any other faults or warnings that appear within these 5 days. Ensure they are not related to ASFC. - NOTE 02: As a side note, I recall that in similar failures, performing SB1887 on 3 of the 5 aircraft with the same message on the screen resolved the problem.', crs:'CRS issued: Work carried out in accordance with AMM. Aircraft released to service by authorised certifying staff. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PTJ', created_at:'2026-06-27', status:'open', tx_hil:'HIL-117954' },
    { id:9, atl_number:'ATL-526718', pilot_report:'Capt. Mohamed Rashid: Intermittent WEATHER RADAR FAULT ECAM during descent into LPA. Radar picture lost twice with antenna stabilisation flag, restored after reselection. No other system affected. Requests engineering disposition.', certifying_action:'WXR interrogated per TSM 34-43-00. BITE recorded an intermittent transmitter/receiver module fault; antenna drive and waveguide continuity normal. Not clearable at line and not consistently reproducible on ground. Resolved per MEL 34-43-01 (Cat C): dispatch permitted with weather radar inoperative provided flight is not conducted into known or forecast thunderstorm/turbulence areas without alternate means and the crew is briefed. WXR selected OFF, INOP placard fitted. Released to service under MEL. Item closed at line; R&R of WXR T/R module to be scheduled within interval.', crs:'Released to service per MEL 34-43-01 Cat C, weather radar inoperative, placarded. T/R module fault confirmed via TSM 34-43-00 BITE; R&R to be scheduled. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PAA', created_at:'2026-06-29', status:'closed' },
    { id:10, atl_number:'ATL-634902', pilot_report:'Capt. Amina Khamis: PROP DE-ICE 2 FAULT recurring in light icing FL150. De-ice timer cycling abnormally on No.2 propeller, caption recurred three times. Crew requests Technical Support assessment.', certifying_action:'Propeller de-icing No.2 interrogated per TSM 30-61-00. Intermittent fault in the No.2 prop de-ice timer/brush-block circuit; heating element resistance within limits, fault isolated to the sequencing timer. Not rectifiable at line. Resolved per MEL 30-61-02 (Cat C): dispatch permitted with one propeller de-icing system inoperative provided flight into known or forecast icing is avoided and the crew is briefed on reduced ice protection. PROP DE-ICE 2 selected OFF, INOP placard fitted. Released to service under MEL. Item closed; timer R&R to be scheduled within interval.', crs:'Released to service per MEL 30-61-02 Cat C, No.2 propeller de-icing inoperative, placarded; avoid known/forecast icing. Timer fault confirmed per TSM 30-61-00; R&R to be scheduled. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PCK', created_at:'2026-07-01', status:'closed' },
    { id:11, atl_number:'ATL-447185', pilot_report:'Capt. Said Mbarouk: PACK 1 FAULT with BLEED 1 LO PR in cruise FL190. Pack 1 tripped offline twice, restored after bleed reselection; cabin temperature managed on Pack 2. Recurring over the last two sectors. Requests Technical Support and MEL position.', certifying_action:'Bleed 1 / Pack 1 interrogated per TSM 36-11-00 and 21-50-00. Intermittent bleed 1 pressure-regulation fault (PRV modulation) causing Pack 1 low-pressure trip; no duct overheat or leak, Pack 2 fully serviceable. Not consistently reproducible on ground, not rectifiable within turnaround. Resolved per MEL 36-11-01 (Cat C): dispatch permitted with Bleed 1 / Pack 1 inoperative provided single-pack performance limitations are applied and the crew is briefed. BLEED 1 selected OFF, INOP placard fitted. Released to service under MEL. Item closed; bleed 1 PRV investigation to be scheduled within interval.', crs:'Released to service per MEL 36-11-01 Cat C, Bleed 1 / Pack 1 inoperative, placarded, single-pack limitations applied. Intermittent PRV regulation fault per TSM 36-11-00; investigation to be scheduled. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PTJ', created_at:'2026-07-01', status:'closed' },
    { id:12, atl_number:'ATL-882013', pilot_report:'Capt. Zainab Abdalla: DC GEN 2 FAULT recurring in cruise. No.2 DC generator drops offline intermittently (four occurrences this week), each time recovered by GEN 2 reset; electrical load shed automatically to GEN 1 with no loss of services. No smell or smoke. Crew requests Technical Support determination - this is the fourth report on the same fault.', certifying_action:'DC GEN 2 interrogated per TSM 24-30-00. Recurring intermittent No.2 DC generator trip; GEN 2 BITE shows a control/regulation (GCU) channel fault that re-arms on reset, generator output normal when on line, no overheat. Repeated line resets have not resolved it (fourth occurrence) = genuine recurring fault requiring Technical Support and component action, not a nuisance. Transferred to HIL (HIL-553240) for investigation and GEN 2 GCU/generator R&R, and Work Order 774120 raised. Dispatched per MEL 24-30-01 (Cat C): operation permitted with No.2 DC generator inoperative provided GEN 1 and TRU are available and electrical load is within single-generator capacity. Deferred, max 10 days. Released to service under MEL pending HIL resolution.', crs:'Released to service per MEL 24-30-01 Cat C, No.2 DC generator inoperative. Recurring GEN 2 trip confirmed per TSM 24-30-00 (GCU/regulation channel suspect). Transferred to HIL-553240 and WO 774120 for R&R; deferred max 10 days. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PWA', created_at:'2026-07-01', status:'open', tx_hil:'HIL-553240' },
    { id:13, atl_number:'ATL-903217', pilot_report:'Omar Juma (certifying staff, ramp) telephone report at turnaround. Aircraft 5H-PAA raised three items on approach/descent into LPA. PROBLEM 1: FLAPS UNRELIABLE master caution on FLAPS 15 selection, amber flicker on F/CTL synoptic, coincident transient drop of engine 1 propeller speed (Np) from 82% to 74% recovering automatically in 3 sec, FLAPS advisory light remained illuminated amber after stabilisation. PROBLEM 2: Torque 2 digital indication intermittently blank (dashes) during descent through FL140, coincident AIR BLEED 2 FAULT with automatic closure of ENG 2 bleed valve; ITT, NH and NL symmetric and stable throughout. PROBLEM 3: STBY PITOT amber light on ANTI-ICE overhead pre-flight check, NAV PITOT 3 FAULT on EWD.', certifying_action:'PROBLEM 3 cleared first: MEL 34-11-01 (Pitot Heating System - Standby) cross-checked by Omar Juma, Category C, Pitot 1 and 2 confirmed nominal, no known or forecast icing on route - deferred. PROBLEM 1: Salum Komba (Engineering) joined the line to assess MFC-to-PEC1 cross-talk architecture. Blue hydraulic pressure confirmed stable at 3000 psi throughout the event and flap surfaces mechanically reached 15 deg, ruling out ATA 29 actuator/asymmetry causes. Physical inspection of the wing-to-fuselage fairing disconnect panels per instruction from Salum Komba found a chafing point on harness 2M near the wing root rib: wire 2M-2751, which carries flap position discretes from the MFC to PEC 1, had exposed copper contacting the airframe structure, producing an intermittent ground short that corrupted the position signal and caused the PEC 1 to enter a transient default schedule (Np dip). Engineering formally declined a quick splice given the safety-critical nature of the signal and directed a full EWIS repair: environmental crimp splice with thermal shrink seal on 2M-2751 plus an additional teflon chafe sleeve at the rib station, per AMM 20-00-00. PROBLEM 2: continuity check across the Torque 2 sensor shield and Bleed 2 solenoid ground return measured a fluctuating resistance above 200 ohms under simulated vibration (limit <0.5 ohms), isolated to Terminal Block 403VU in the engine 2 firebox - shared structural ground return for both circuits. Nut found loose, locking washer broken, significant galvanic corrosion on the eyelet. Engineering directed replacement of nut and locking washer with new hardware, anti-corrosion treatment, and torque to AMM Standard Practices per AMM 24-50-00 (no component replacement authorised on sensor or valve). Post-repair: MFC/PEC1 BITE clear, three consecutive flap extend/retract cycles symmetric with no EWD alerts, Engine Run-Up per AMM 71-00-00 with ENG 2 BLEED selected ON showed nominal valve opening and stable continuous torque indication.', crs:'Released to service. PROBLEM 1 and PROBLEM 2 closed - root cause corrected: EWIS environmental splice on wire 2M-2751 (AMM 20-00-00) and ground terminal block 403VU hardware replacement/torque (AMM 24-50-00), both under Engineering directive; post-repair BITE and Engine Run-Up satisfactory. PROBLEM 3 (Pitot 3 standby heater) deferred to HIL-609317 under MEL 34-11-01 Cat C, max 10 days, no known or forecast icing conditions. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PAA', created_at:'2026-07-01', status:'open', tx_hil:'HIL-609317' },
    { id:14, atl_number:'ATL-916482', pilot_report:'Omar Juma (certifying staff, ramp) telephone report at turnaround. Aircraft 5H-PCK, same fault family as ATL-903217, three items raised. PROBLEM 1: FLAPS UNRELIABLE master caution on FLAPS 15 selection, F/CTL synoptic amber flicker, transient engine 1 Np drop 82% to 74% recovering in 3 sec, FLAPS advisory light remained amber. PROBLEM 2: Torque 2 dashes intermittently during descent FL140 with coincident AIR BLEED 2 FAULT and automatic bleed valve closure; ITT/NH/NL stable and symmetric. PROBLEM 3: STBY PITOT amber, NAV PITOT 3 FAULT on EWD.', certifying_action:'PROBLEM 3 deferred first under MEL 34-11-01, Category C, Pitot 1/2 nominal, no icing forecast on route. PROBLEM 1: Salum Komba (Engineering) confirmed Blue hydraulic system remained stable at 3000 psi and flap surfaces mechanically reached commanded position, ruling out hydraulic/actuator cause. Physical inspection of the wing-to-fuselage fairing disconnect panels by Omar Juma located a chafing point on harness 2M near the wing root rib identical in nature to the 5H-PAA finding: wire 2M-2751 (MFC to PEC 1 position discrete) had exposed copper contacting structure, producing an intermittent ground fault that corrupted the flap position signal and drove PEC 1 into a transient default pitch schedule. Engineering directed full EWIS repair per AMM 20-00-00: environmental crimp splice with thermal shrink seal plus additional teflon chafe protection at the rib crossing point. PROBLEM 2: ground continuity check on the Torque 2 shield / Bleed 2 solenoid common return again isolated to Terminal Block 403VU in the engine 2 firebox, showing fluctuating resistance over 200 ohms under vibration; retaining nut loose, locking washer fractured, galvanic corrosion on eyelet contact. Engineering directed nut/washer replacement with new hardware, anti-corrosion treatment and torque per AMM Standard Practices (AMM 24-50-00). Post-repair BITE of MFC/PEC1 clear, three flap cycles symmetric with no EWD alerts, Engine Run-Up (AMM 71-00-00) with ENG 2 BLEED ON showed nominal valve response and stable continuous torque indication.', crs:'Released to service. PROBLEM 1 and PROBLEM 2 closed - EWIS splice on wire 2M-2751 (AMM 20-00-00) and 403VU ground terminal hardware R&R/torque (AMM 24-50-00) both completed under Engineering directive; post-repair BITE and Engine Run-Up satisfactory. PROBLEM 3 (Pitot 3) deferred to HIL-614852 under MEL 34-11-01 Cat C, max 10 days, no known/forecast icing. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PCK', created_at:'2026-07-01', status:'open', tx_hil:'HIL-614852' },
    { id:15, atl_number:'ATL-927154', pilot_report:'Omar Juma (certifying staff, ramp) report on arrival, aircraft 5H-PAA, two sticky items. PROBLEM 1: AIR BLEED 1 FAULT master caution during initial climb crossing FL120, Bleed 1 valve closed amber on AIR synoptic, correlated PACK 1 FAULT (loss of Pack 1 supply pressure); engine parameters (ITT, TQ, NH, NL) showed no deviation, no smoke or odour. QRH AIR BLEED 1 FAULT applied, ENG 1 BLEED selected OFF. PROBLEM 2: ELEC STBY UNDV master caution during landing rollout at max reverse, Np below 70.8%; DC STBY BUS showed transient drop below 19.5V, restabilising intermittently at 24V after 3 sec, with simultaneous loss of DU 2 navigation data (FMA 1 unavailable) and overhead panel light flicker. No DC GEN 1/2 FAULT recorded. Aircraft taxied to stand with right engine in Hotel Mode.', certifying_action:'CMS download on CAC 1 showed zero stored ATA 36 overtemperature/overpressure codes, ruling out a genuine bleed duct fault. Salum Komba (Engineering) directed investigation of external Bleed 1 auto-close signals per MFC logic (Fire Handle, Uptrim, Propeller Brake). Continuity test on the Propeller Brake microswitch assembly (S11) found wire 2BB-3 intermittently shorting to ground inside the engine 1 nacelle conduit due to friction against the frame, sending a false brake-engaged discrete to MFC 1A which commanded automatic Bleed 1 closure - no genuine pneumatic fault. Separately, Main Battery static voltage measured 26.2V (nominal), ruling out battery degradation as the ELEC STBY UNDV cause; inspection under load of the Essential Tie Relays and Essential Power Distribution Rack (12VU) found terminal 3 with internal high resistance due to electrical arcing/pitting, explaining the transient voltage drop below 19.5V during the ACW-to-DC load transfer on landing rollout without a stored generator fault. Engineering directive: reconditioning of terminal 3 (fine-grade approved abrasive, conductor material loss verified under 5% nominal, final torque per AMM Standard Practices) per AMM 24-35, and EWIS crimp splice with high-temperature heat-shrink protection on wire 2BB-3 per AMM 61-30. Post-repair: MFC self-test clear, Bleed 1 opened/closed nominally on cabin switch demand with no uncommanded closure, and DC STBY BUS held stable under simulated ACW dropout with no DU flicker.', crs:'Released to service. Both items closed - root cause corrected: EWIS repair on Propeller Brake microswitch wire 2BB-3 (AMM 61-30) and terminal 3 reconditioning at Essential Power Distribution Rack 12VU (AMM 24-35), both under Engineering directive. Post-repair functional tests satisfactory, no deferral required. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PAA', created_at:'2026-07-02', status:'closed' },
    { id:16, atl_number:'ATL-934820', pilot_report:'Omar Juma (certifying staff, ramp) report on arrival, aircraft 5H-PCK, same double fault family as ATL-927154. PROBLEM 1: AIR BLEED 1 FAULT during initial climb crossing FL120, Bleed 1 valve closed amber, correlated PACK 1 FAULT; engine parameters stable, no smoke or odour. QRH applied, ENG 1 BLEED selected OFF. PROBLEM 2: ELEC STBY UNDV during landing rollout at max reverse, Np below 70.8%; DC STBY BUS transient drop below 19.5V, intermittent restabilisation at 24V, coincident loss of DU 2 data and overhead light flicker. No DC GEN 1/2 FAULT stored.', certifying_action:'CMS download on CAC 1 clear of ATA 36 overtemperature/overpressure history. Salum Komba (Engineering) directed the same external-signal investigation applied on 5H-PAA. Continuity test on the Propeller Brake microswitch assembly (S11) again isolated an intermittent ground short on wire 2BB-3 inside the engine 1 nacelle conduit, caused by friction against the frame, generating a false brake-engaged discrete to MFC 1A and automatic Bleed 1 closure. Main Battery static voltage 26.2V, nominal. Inspection under load of the 12VU Essential Power Distribution Rack again found terminal 3 with internal high resistance from arcing/pitting, matching the mechanism identified on 5H-PAA and explaining the transient sub-19.5V dip during the ACW-to-DC transfer on landing rollout. Engineering directive: terminal 3 reconditioning (approved fine abrasive, conductor loss verified under 5%, torque per AMM Standard Practices) per AMM 24-35, and EWIS crimp splice with heat-shrink protection on wire 2BB-3 per AMM 61-30. Post-repair MFC self-test clear, Bleed 1 cycled nominally with no uncommanded closure, DC STBY BUS stable under simulated ACW dropout.', crs:'Released to service. Both items closed - EWIS repair on Propeller Brake microswitch wire 2BB-3 (AMM 61-30) and terminal 3 reconditioning at 12VU rack (AMM 24-35) completed under Engineering directive, post-repair tests satisfactory, no deferral required. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PCK', created_at:'2026-07-02', status:'closed' },
    { id:17, atl_number:'ATL-941763', pilot_report:'Omar Juma (certifying staff, ramp) telephone report at turnaround, aircraft 5H-PGF, same fault family as ATL-903217/ATL-916482. PROBLEM 1: FLAPS UNRELIABLE on FLAPS 15 selection, F/CTL synoptic amber flicker, transient engine 1 Np drop 82% to 74% recovering in 3 sec, FLAPS light remained amber. PROBLEM 2: Torque 2 intermittent dashes during descent FL140 with coincident AIR BLEED 2 FAULT and automatic valve closure; ITT/NH/NL stable and symmetric. PROBLEM 3: STBY PITOT amber, NAV PITOT 3 FAULT on EWD.', certifying_action:'PROBLEM 3 deferred first under MEL 34-11-01, Category C, Pitot 1/2 nominal, no icing forecast. PROBLEM 1: Salum Komba (Engineering) confirmed Blue hydraulic pressure stable at 3000 psi with flap surfaces mechanically reaching 15 deg, ruling out ATA 29 causes. Physical inspection of the wing-to-fuselage fairing disconnect panels located the recurring chafing point on harness 2M near the wing root rib: wire 2M-2751 (MFC to PEC 1 position discrete) with exposed copper contacting structure, producing the intermittent ground fault behind both the FLAPS UNRELIABLE message and the Np transient. Engineering directed full EWIS repair per AMM 20-00-00: environmental crimp splice with thermal shrink seal plus teflon chafe sleeve at the rib crossing. PROBLEM 2: continuity check on Torque 2 shield / Bleed 2 solenoid common return isolated to Terminal Block 403VU in the engine 2 firebox, fluctuating resistance above 200 ohms under vibration, loose retaining nut, fractured locking washer, galvanic corrosion. Engineering directed hardware replacement, anti-corrosion treatment and torque per AMM Standard Practices (AMM 24-50-00). Post-repair MFC/PEC1 BITE clear, three flap cycles symmetric with no EWD alerts, Engine Run-Up (AMM 71-00-00) with ENG 2 BLEED ON nominal and torque indication stable.', crs:'Released to service. PROBLEM 1 and PROBLEM 2 closed - EWIS splice on wire 2M-2751 (AMM 20-00-00) and 403VU ground terminal hardware R&R/torque (AMM 24-50-00) completed under Engineering directive; post-repair tests satisfactory. PROBLEM 3 (Pitot 3) deferred to HIL-623190 under MEL 34-11-01 Cat C, max 10 days, no known/forecast icing. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PGF', created_at:'2026-07-02', status:'open', tx_hil:'HIL-623190' },
    { id:18, atl_number:'ATL-958290', pilot_report:'Fatma Ali (certifying staff, on board) with Capt. Ali present for debrief, aircraft 5H-PTJ. PROBLEM 1 (in-flight, cruise FL170): cascade MASTER CAUTION - ELEC DC GEN 2 FAULT followed immediately by ELEC DC BUS 2 OFF and AIR PACK 2 FAULT; same second, engine 2 ITT showed a rapid +45C spike and EWD presented NAV AHRS 2 ALIGN. Crew reset DC GEN 2 after 2 min, all systems restored. Captain Ali initially attributed the event to an engine 2 compressor surge or bleed valve jam shaking the accessory gearbox and tripping the generator. PROBLEM 2: Radio Altimeter 2 indication lost on descent, PFD 2 showed red RA flag, NAV RA 2 FAULT on EWD; RA 1 operated normally.', certifying_action:'PROBLEM 1: Pablo (MCC) corrected the reported causal sequence with the crew - the electrical failure occurred first. CMS BITE on the DC network showed no active codes but history recorded a GCU 2 overvoltage trip; FIM 24-30-00 called for direct replacement of the DC Starter/Generator. Salum Komba (Engineering) raised a formal technical disagreement with this FIM step: since the crew successfully reset DC GEN 2 in flight, the generator armature was not mechanically damaged, and the GCU had sensed a false overvoltage. Engineering identified sensing pin D on GCU 2 connector 151VU (90VU electrical rack) as the known intermittent point on this fleet. Fatma Ali extracted GCU 2 and found pin D with a broken retaining clip, exhibiting pin push-out under vibration, causing the GCU to lose voltage reference, falsely sense overvoltage and open the line contactor - this explains the loss of DC BUS 2, the fail-safe closure of the Pack 2 bleed valve (hence the ITT spike from the momentary bleed air reduction) and the AHRS 2 realignment request, all as downstream effects of the single electrical fault. Engineering approved repin of the connector with approved extraction tool and new contact per AWP, followed by Engine Run-Up to load the generator. PROBLEM 2: RA 2 fault confirmed not clearable at line, deferred under MEL 34-42-01 Cat C with Autopilot CAT II coupled approach restricted (CAT I only).', crs:'Released to service. PROBLEM 1 closed - GCU 2 connector 151VU pin D repaired (new contact, approved extraction tool per AWP), DC Generator retained (no R&R), Engine Run-Up confirmed DC BUS 2 stable at 28.5V under full load with both Packs operating normally. PROBLEM 2 (RA 2) deferred to HIL-631476 under MEL 34-42-01 Cat C, max 10 days, CAT II coupled approach restricted to CAT I only. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PTJ', created_at:'2026-07-02', status:'open', tx_hil:'HIL-631476' },
    { id:19, atl_number:'ATL-962415', pilot_report:'Omar Juma (certifying staff, ramp) report on arrival, aircraft 5H-PWA, same double fault family as ATL-927154/ATL-934820. PROBLEM 1: AIR BLEED 1 FAULT during initial climb crossing FL120, Bleed 1 valve closed amber, correlated PACK 1 FAULT; engine parameters stable, no smoke or odour. QRH applied, ENG 1 BLEED selected OFF. PROBLEM 2: ELEC STBY UNDV during landing rollout at max reverse, Np below 70.8%; DC STBY BUS transient drop below 19.5V, intermittent restabilisation at 24V, coincident loss of DU 2 data and overhead light flicker. No DC GEN 1/2 FAULT stored.', certifying_action:'CMS download on CAC 1 clear of ATA 36 overtemperature/overpressure history. Salum Komba (Engineering) directed the same external-signal check applied on the 5H-PAA and 5H-PCK occurrences. Continuity test on the Propeller Brake microswitch assembly (S11) isolated an intermittent ground short on wire 2BB-3 inside the engine 1 nacelle conduit from friction against the frame, generating a false brake-engaged discrete to MFC 1A and automatic Bleed 1 closure. Main Battery static voltage 26.2V, nominal. Inspection under load of the 12VU Essential Power Distribution Rack again found terminal 3 with internal high resistance from arcing/pitting, matching the mechanism found fleet-wide and explaining the transient sub-19.5V dip during the ACW-to-DC transfer on landing rollout. Engineering directive: terminal 3 reconditioning (approved fine abrasive, conductor loss verified under 5%, torque per AMM Standard Practices) per AMM 24-35, and EWIS crimp splice with heat-shrink protection on wire 2BB-3 per AMM 61-30. Post-repair MFC self-test clear, Bleed 1 cycled nominally with no uncommanded closure, DC STBY BUS stable under simulated ACW dropout.', crs:'Released to service. Both items closed - EWIS repair on Propeller Brake microswitch wire 2BB-3 (AMM 61-30) and terminal 3 reconditioning at 12VU rack (AMM 24-35) completed under Engineering directive, post-repair tests satisfactory, no deferral required. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PWA', created_at:'2026-07-02', status:'closed' },
    { id:20, atl_number:'ATL-977106', pilot_report:'Hassan Said (certifying staff, ramp) report at turnaround, aircraft 5H-PWG, cross-system snag. PROBLEM 1: FLAPS UNRELIABLE on FLAPS 15 selection with F/CTL synoptic amber flicker, transient engine 1 Np oscillation 82% to 76% with fuel-flow light flicker, FLAPS light remained amber after manual recovery. PROBLEM 2: Torque 2 intermittent dashes in cruise FL160 with coincident AIR BLEED 2 FAULT and automatic HP/LP bleed valve closure; ITT/NH/NL stable and symmetric, QRH applied. PROBLEM 3: STBY PITOT mast heater amber on ANTI-ICE overhead pre-flight, NAV PITOT 3 FAULT on EWD.', certifying_action:'PROBLEM 3 deferred first under MEL 34-11-01 Cat C, Pitot 1/2 nominal, no icing forecast. PROBLEM 1: Salum Komba (Engineering) noted this occurrence differs mechanically from the harness-chafe cases: CMS on CAC 1 recorded IOM Module 3 Bus Disconnection, a phantom code since the flap actuator mechanically reached 15 deg with Blue hydraulic pressure stable throughout. Salum Komba directed a harness/backplane check of the CAC 1 avionics cabinet rather than a hydraulic component change. Hassan Said found the IOM Module 3 retaining latch not fully locked, allowing pin arcing on the data backplane when hydraulic/aerodynamic vibration reached the bay - this intermittent data loss caused the PEC 1 to enter a default flight law (Np transient) and the MFC to report FLAPS UNRELIABLE. PROBLEM 2: ground resistance on the Torque 2 shield / Bleed 2 solenoid common return exceeded 150 ohms at Terminal Block 403VU in the engine 2 firebox; loose retaining nut and severe galvanic corrosion. Engineering directed mechanical cleaning of the terminal, anti-corrosion compound, new eyelet hardware and torque per AMM Standard Practices. Post-repair: IOM Module 3 reseated and latch-locked per AMM 45-11-11-001, BITE on MFC 1A/1B and 2A/2B clear, three flap cycles (0-30 deg) stable with no EWD alerts, Engine Run-Up (AMM 71-00-00) confirmed nominal Torque 2 and Bleed 2 response.', crs:'Released to service. PROBLEM 1 and PROBLEM 2 closed - IOM Module 3 reseated/relatched in CAC 1 (AMM 45-11-11-001) and 403VU ground terminal cleaned/re-hardware/torqued (AMM 24-50-00-710), both under Engineering directive; post-repair BITE and Engine Run-Up satisfactory. PROBLEM 3 (Pitot 3 mast heater) deferred to HIL-648205 under MEL 34-11-01 Cat C, max 10 days, no known/forecast icing. AME Lic B1.1 \u2013 EASA.145.0419.', aircraft_reg:'5H-PWG', created_at:'2026-07-02', status:'open', tx_hil:'HIL-648205' },

    { id:1, hil_number:'HIL-771042', ata:'32-42', title:'NLG Steering Shimmy Damper – Leaking', description:'NLG shimmy damper found with hydraulic fluid seeping from lower gland seal during pre-flight inspection.', aircraft_reg:'5H-PWA', atl_wo_ref:'ATL-881203 / WO-483921', reason:'Leak rate within acceptable limit for continued operation per MEL 32-42-1.', mel_cat:'B', mel_ref:'32-42-1-A', mel_ata:'32', mel_item:'42', mel_sub:'1', mel_point:'A', interval_fh:'0', interval_dy:'3', deadline:'2026-06-24', signature:'PaMCC26', reply_solution:'Pending replacement at next maintenance opportunity – BRU base.', reply_station:'BRU', reply_date:'', reply_sig:'', status:'closed' },

    { id:3, hil_number:'HIL-630294', ata:'29-11', title:'Green Hydraulic Pump – Case Drain Temp Trend', description:'GREEN HYD LO PR transient in cruise (1,950 psi / 4 min, spontaneous recovery). Green hydraulic pump case drain temperature trending upward: 10-sector avg 71°C, last three sectors 74-76-78°C (limit 85°C). No fault codes, no delta-P abnormality, no fluid loss. Assessed as early pump wear, not structural.', aircraft_reg:'5H-PAA', atl_wo_ref:'ATL-294017', reason:'Within AMM limits (78°C vs 85°C). No corroborating fault. Not a release blocker. Monitoring per Engineering instruction rather than immediate pump replacement.', mel_cat:'C', mel_ref:'29-11-ENG-MON', mel_ata:'29', mel_item:'11', mel_sub:'0', mel_point:'A', interval_fh:'0', interval_dy:'10', deadline:'2026-06-30', signature:'PaMCC26', reply_solution:'Monitor case drain temp trend. Borescope + load test scheduled at next A-check per Engineering monitoring instruction.', reply_station:'LPA', reply_date:'2026-06-27', reply_sig:'PaMCC26' },
    { id:4, hil_number:'HIL-448120', ata:'22-20', title:'Yaw Damper Computer – Channel Fault', description:'YAW DAMPER FAULT ECAM latched in cruise FL180; YD would not re-arm after recycle. TSM 22-20-00 BITE confirmed a genuine YD computer channel fault (rate-gyro input fail), not a nuisance trip. Dutch-roll damping lost with YD off; mild Dutch-roll tendency reported by crew. Cannot be restored at line.', aircraft_reg:'5H-PCK', atl_wo_ref:'ATL-715388', reason:'Genuine YD channel failure, not restorable at line. Dispatch permitted with Yaw Damper inoperative per MEL 22-20-01 (Cat C) under operational conditions: crew briefed on loss of Dutch-roll damping and manual rudder coordination, moderate or greater turbulence avoided where practicable, autopilot remains available for normal ops.', mel_cat:'C', mel_ref:'22-20-01-A', mel_ata:'22', mel_item:'20', mel_sub:'01', mel_point:'A', interval_fh:'0', interval_dy:'10', deadline:'2026-07-01', signature:'PaMCC26', reply_solution:'YD computer (P/N 22-20-YDC) on order; replacement scheduled at LPA/BRU base within MEL interval. YD selected OFF and collared, INOP placard fitted.', reply_station:'LPA', reply_date:'', reply_sig:'' },
    { id:5, hil_number:'HIL-117954', ata:'22-26', title:'ASFC', description:'OPT IAW AMM ATA OPT 22-26-0002-320-A-A ref. 01Jun26 was performed. Test satisfactory. ASFC is still being monitored. The message did not appear on the screen. Two hops remain to complete the route. Perform AFCS functional and operational checks before landing and on the ground. Upload results to the portal. Documentation is attached to this WO via the portal.', aircraft_reg:'5H-PWA', atl_wo_ref:'ATL-741134', reason:'monitoring is required for 5 days. NOTE 01: The WO will be closed when the route is finished and all the data has been collected. The aircraft is good condition to fly as there are no visible faults or annotations. In accordance with TSM 22-28, monitoring is required for 5 days. NOTE 02: As a side note, I recall that in similar failures, performing SB1887 on 3 of the 5 aircraft with the same message on the screen resolved the problem.', mel_cat:'A', mel_ref:'N/P', mel_ata:'N/P', mel_item:'N/P', mel_sub:'N/P', mel_point:'N/P', interval_fh:'0', interval_dy:'5', deadline:'2026-07-01', signature:'PaMCC26', reply_solution:'', reply_station:'BRU', reply_date:'2026-06-27', reply_sig:'', status:'deferred' },
    { id:6, hil_number:'HIL-553240', ata:'24-30', title:'No.2 DC Generator - Recurring Trip (GCU suspect)', description:'Recurring intermittent No.2 DC generator trip in cruise (four occurrences in one week), each recovered by GEN 2 reset with automatic load transfer to GEN 1. GEN 2 BITE indicates a control/regulation (GCU) channel fault that re-arms on reset; generator output normal when on line. Transferred from ATL-882013 for investigation and component replacement.', aircraft_reg:'5H-PWA', atl_wo_ref:'ATL-882013', reason:'Recurring fault not resolved by repeated line resets; requires GCU and/or generator R&R and bench investigation. Dispatched per MEL 24-30-01 Cat C with No.2 DC generator inoperative (GEN 1 + TRU available, load within single-generator capacity). Work Order 774120 raised for R&R. Monitor electrical load and GEN 1 status each sector until rectified.', mel_cat:'C', mel_ref:'MEL 24-30-01', mel_ata:'24', mel_item:'30', mel_sub:'01', mel_point:'-', interval_fh:'0', interval_dy:'10', deadline:'2026-07-01', signature:'PaMCC26', reply_solution:'', reply_station:'LPA', reply_date:'2026-06-27', reply_sig:'', status:'deferred' },

const SB_HEADERS = {

  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'resolution=merge-duplicates,return=minimal'
};

let currentView = 'dashboard';
let _pushTimer  = null;

function setSync(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = { synced: '\u2601 synced', syncing: '\u21bb syncing...', offline: 'offline', error: '\u26a0 sync error' };
  el.textContent = map[state] || state;
  el.style.opacity = state === 'synced' ? '.45' : '1';
}

async function sbPull() {
  try {
    const r = await fetch(
      SB_URL + '/rest/v1/' + SB_TABLE + '?id=eq.' + SB_ROW + '&select=data',
      { headers: SB_HEADERS }
    );
    if (!r.ok) { setSync('error'); return null; }
    const rows = await r.json();
    return rows.length ? rows[0].data : null;
  } catch (e) { setSync('offline'); return undefined; }
}

async function sbPush() {
  setSync('syncing');
  try {
    const body = JSON.stringify({ id: SB_ROW, data: { v: APP_VERSION, db: db }, updated_at: new Date().toISOString() });
    const r = await fetch(SB_URL + '/rest/v1/' + SB_TABLE,
      { method: 'POST', headers: SB_HEADERS, body });
    setSync(r.ok ? 'synced' : 'error');
  } catch (e) { setSync('offline'); }
}

function schedulePush() {
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(sbPush, 1500);
}

async function sbDeleteRow() {
  try {
    await fetch(SB_URL + '/rest/v1/' + SB_TABLE + '?id=eq.' + SB_ROW,
      { method: 'DELETE', headers: SB_HEADERS });
  } catch (e) {}
}

async function startSync() {
  setSync('syncing');
  const remote = await sbPull();
  if (remote === undefined) { setSync('offline'); return; }   // offline: keep local
  if (remote === null) { await sbPush(); return; }            // no remote row yet: seed it

  // Versioned payload { v, db }. Legacy rows (raw db, no v) are treated as version-mismatch.
  const remoteVer = (remote && typeof remote === 'object' && 'v' in remote) ? remote.v : null;
  const remoteDb  = (remoteVer !== null) ? remote.db : remote;

  // If the remote snapshot is from a different app version, it is stale relative to the
  // current seed: discard it and push the current (new-version) data instead.
  if (remoteVer !== APP_VERSION) { await sbPush(); showView(currentView); return; }

  Object.keys(remoteDb).forEach(k => { if (db[k]) db[k] = remoteDb[k]; });
  saveDB();
  showView(currentView);
  setSync('synced');
}

// ═══ PERSISTENCE (same-device, localStorage) ═══
const DB_KEY = 'asl_db';
function saveDB() {
  try { localStorage.setItem(DB_KEY, JSON.stringify({ v: APP_VERSION, db: db })); } catch (e) {}
  schedulePush();
}
function loadDB() {
  try {
    const s = localStorage.getItem(DB_KEY);
    if (!s) return;
    const o = JSON.parse(s);
    if (o && o.db && o.v === APP_VERSION) { Object.keys(o.db).forEach(k => { db[k] = o.db[k]; }); }
  } catch (e) { /* corrupt store: ignore and keep seed data */ }
}
function resetData() {
  if (!confirm('Reset ALL data to factory defaults?\n\nThis erases changes saved on THIS device and reloads the original sample data.')) return;
  try { localStorage.removeItem(DB_KEY); } catch (e) {}
  sbDeleteRow().finally(() => location.reload());
}

function startClock() {
  function tick() {
    const now = new Date(Date.now() + 3600000);
    const d = now.toUTCString().replace(' GMT','');
    document.getElementById('clock').textContent = d.split(' ').slice(1,5).join(' ') + ' LT+1';

  tick(); setInterval(tick, 1000);

function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  const content = document.getElementById('content');
  switch(view) {
    case 'dashboard': content.innerHTML = renderDashboard(); bindDashNotes(); break;
    case 'aircraft':  content.innerHTML = renderAircraft(); break;
    case 'wo':        content.innerHTML = renderWO(); break;
    case 'atl':       content.innerHTML = renderATL(); break;
    case 'hil':       content.innerHTML = renderHIL(); break;
    case 'historial': content.innerHTML = renderHistorial(); break;
    case 'contacts':  content.innerHTML = renderContacts(); break;
    case 'email':     content.innerHTML = renderEmail(); break;
    case 'reports':   content.innerHTML = renderReports(); bindReports(); break;
    case 'scheduler': content.innerHTML = renderScheduler(); bindScheduler(); break;
  }
  try { saveDB(); } catch (e) {}
}

    return matchFilter && matchSearch;
  });
  const rows = filtered.map(h => {
    const isClosed = h.status === 'closed';
    const days = Math.ceil((new Date(h.deadline) - new Date(T)) / 86400000);
    const cls = days <= 3 ? 'deadline-urgent' : days <= 5 ? 'deadline-warn' : 'deadline-ok';
    const deadlineCell = isClosed ? `${h.deadline}` : `${h.deadline} <span class="${cls}">(${days}d)</span>`;
    const statusCell = isClosed ? `<span class="status-tag s-closed">Closed</span>` : `<span class="status-tag s-deferred">Deferred</span>`;

function closeHIL(id) {
  const h = db.hil.find(x=>x.id===id); if(!h) return;
  if(!confirm('Close this deferral?\n\nIt will be marked Closed and removed from the active deferral list. Reply date and signature are stamped automatically if blank.')) return;
  h.status = 'closed';
  if(!h.reply_date) h.reply_date = today();
  if(!h.reply_sig) h.reply_sig = SIGN;
  if(!h.reply_solution) h.reply_solution = 'Deferral cleared - rectification complete.';
  closeModal(); showView('hil'); showToast('HIL closed', 'success');
}
function reopenHIL(id) {
  const h = db.hil.find(x=>x.id===id); if(!h) return;
  if(!confirm('Reopen this deferral?\n\nIt will return to the active deferral list.')) return;

// ═══════════════════════════════════════════════════════════
let swReg = null;
(function registerSW() {
  try {
    if (!('serviceWorker' in navigator)) return;
    // A Service Worker only works (and only registers without error) when the page is
    // served over https, or http on localhost. In any other context - file://, about:blank,
    // blob:, an srcdoc/preview pane - registration is invalid, so skip it cleanly.
    var httpOK = location.protocol === 'https:' ||
      (location.protocol === 'http:' && (location.hostname === 'localhost' || location.hostname === '127.0.0.1'));
    if (!httpOK) {
      console.log('SW skipped: needs the https site or localhost. Notifications use the deployed PWA.');
      return;
    }
    // Relative script URL: register() resolves it against the page base, so it maps to
    // .../service-worker.js at whatever path the app is served from. No new URL() needed
    // (that throws on non-resolvable bases like about:blank).
    var doRegister = function () {
      navigator.serviceWorker.register('service-worker.js')
        .then(function (reg) { swReg = reg; console.log('SW registered:', reg.scope); })
        .catch(function (e) { console.log('SW registration failed:', (e && e.message) ? e.message : e); });
    };
    if (document.readyState === 'complete') doRegister();
    else window.addEventListener('load', doRegister, { once: true });
  } catch (e) {
    console.log('SW registration skipped:', (e && e.message) ? e.message : e);
  }
})();

// Build a ringtone using Web Audio API (no external file needed)
function playRingtone(durationMs) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const start = audioCtx.currentTime;
    // Classic two-tone ring: 440Hz + 480Hz, 2s on / 1s off pattern (US/EU style)
    let t = start;
    const cycles = Math.ceil(durationMs / 3000);
    for (let c = 0; c < cycles; c++) {
      [440, 480].forEach(freq => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.25, t + 0.05);
        gain.gain.setValueAtTime(0.25, t + 1.9);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 2.0);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 2.0);
      });
      t += 3.0; // 2s ring + 1s silence
    }
    // Vibration on supported devices
    if (navigator.vibrate) {
      const pattern = [];
      for (let c = 0; c < cycles; c++) pattern.push(1900, 1100);
      navigator.vibrate(pattern);
    }
  } catch(e) { console.log('Audio error', e); }
}

function stopRingtone() {
  if (audioCtx) { try { audioCtx.close(); } catch(e){} audioCtx = null; }
  if (navigator.vibrate) navigator.vibrate(0);
}

// Arm all pending schedules
function armSchedule() {
  // First tap unlocks the AudioContext for later programmatic playback
  try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state==='suspended') audioCtx.resume(); } catch(e){}
  let armed = 0;
  const now = new Date();
  schedules.forEach((s, idx) => {
    if (s.fired) return;
    const [h, m] = s.time.split(':').map(Number);
    const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
    if (target <= now) target.setDate(target.getDate() + 1);
    const delay = target - now;
    // Lock-screen banner via SW (works in background)
    if (swReg && Notification.permission === 'granted') {
      swReg.active && swReg.active.postMessage({ type:'SCHEDULE', title:s.title, body:s.body, delay });
    }
    // Sound via foreground timer
    schedTimers.push(setTimeout(() => {
      if (s.sound) playRingtone(9000);
      if (!swReg && 'Notification' in window && Notification.permission==='granted') {
        new Notification(s.title, { body:s.body, icon:'./ASL_icon.png' });
      }
      s.fired = true;
      if (document.querySelector('.nav-item.active')?.dataset.view === 'scheduler') showView('scheduler');
    }, delay));
    armed++;
  });
  showToast(`${armed} notification(s) armed`, 'success');
}

function checkNotifPermission() {
  const el = document.getElementById('notif-permission');
  if (!el) return;
  if (!('Notification' in window)) {
    el.innerHTML = '<span style="color:var(--asl-danger)">⚠ Notifications not supported. Use Safari and add to Home Screen.</span>';
    return;
  }
  if (Notification.permission === 'granted') {
    el.innerHTML = '<span style="color:var(--asl-success)">✔ Notifications enabled — press Arm Schedule to start</span>';
  } else if (Notification.permission === 'denied') {
    el.innerHTML = '<span style="color:var(--asl-danger)">✘ Notifications blocked. Enable in iPhone Settings → Apps → ASL.</span>';
  } else {
    el.innerHTML = '<span style="color:var(--asl-warn)">⚠ Permission needed. <button class="btn-sm btn-edit" onclick="requestNotifPermission()">Enable Notifications</button></span>';
  }
}

function requestNotifPermission() {
  Notification.requestPermission().then(p => {
    checkNotifPermission();
    if (p === 'granted') showToast('Notifications enabled!', 'success');
  });
}

function addSchedule() {
  const time = document.getElementById('sch-time').value;
  const title = document.getElementById('sch-title').value.trim();
  const body = document.getElementById('sch-body').value.trim() || 'tap to answer';
  const sound = document.getElementById('sch-sound').value === 'yes';

  if (!time) { showToast('Select a time', 'error'); return; }
  if (!title) { showToast('Enter a title', 'error'); return; }

  schedules.push({ time, title, body, fired:false, sound });
  showToast('Added — press Arm Schedule to activate', 'success');
  showView('scheduler');
}

function deleteSchedule(i) {
  schedules.splice(i, 1);
  showView('scheduler');
  showToast('Deleted', 'success');
}
