<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ASL Technical Support Platform</title>
<link rel="manifest" href="/asl-tech-support/manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a1628'/%3E%3Cpolygon points='6,32 22,12 28,12 12,32 28,52 22,52' fill='%23f26522'/%3E%3Cpolygon points='14,32 28,15 33,15 19,32 33,49 28,49' fill='%23e8a020' opacity='.75'/%3E%3Ctext x='34' y='38' font-family='Arial Black,Arial' font-size='18' font-weight='900' fill='%23f0f4fa' letter-spacing='1'%3EASL%3C/text%3E%3Crect x='34' y='41' width='26' height='2' fill='%23e8a020' opacity='.6'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%230a1628'/%3E%3Cpolygon points='14,90 58,34 74,34 30,90 74,146 58,146' fill='%23f26522'/%3E%3Cpolygon points='36,90 74,38 86,38 48,90 86,142 74,142' fill='%23e8a020' opacity='.75'/%3E%3Ctext x='92' y='108' font-family='Arial Black,Arial' font-size='52' font-weight='900' fill='%23f0f4fa' letter-spacing='2'%3EASL%3C/text%3E%3Crect x='92' y='116' width='76' height='4' fill='%23e8a020' opacity='.6'/%3E%3C/svg%3E">
<style>
:root {
  --asl-navy: #0a1628;
  --asl-blue: #1a3a6e;
  --asl-mid: #1e4d8c;
  --asl-accent: #e8a020;
  --asl-orange: #f26522;
  --asl-light: #d4e4f7;
  --asl-white: #f0f4fa;
  --asl-grey: #8a9bb5;
  --asl-dark: #060e1c;
  --asl-success: #1db87a;
  --asl-danger: #e03e3e;
  --asl-warn: #e8a020;
  --asl-diff: #8b5cf6;
  --sidebar-w: 200px;
  --font-main: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-main);
  background: var(--asl-navy);
  color: var(--asl-white);
  min-height: 100vh;
  font-size: 13px;
}

/* ══ LOGIN ══ */
#login-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, var(--asl-dark) 0%, var(--asl-navy) 50%, #0d2147 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.login-bg-stripe {
  position: absolute; top: 0; left: 0; width: 100%; height: 6px;
  background: linear-gradient(90deg, var(--asl-orange), var(--asl-accent), var(--asl-mid));
}
.login-box {
  background: rgba(10,22,40,0.95);
  border: 1px solid rgba(232,160,32,0.3);
  border-radius: 12px;
  padding: 48px 40px 40px;
  width: 380px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  position: relative;
}
.login-logo {
  text-align: center; margin-bottom: 32px;
}
.logo-svg { width: 200px; height: 70px; }
.login-subtitle {
  text-align: center; color: var(--asl-grey); font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px;
  border-top: 1px solid rgba(255,255,255,0.08); padding-top: 16px;
}
.login-field { margin-bottom: 16px; }
.login-field label {
  display: block; font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--asl-grey); margin-bottom: 6px;
}
.login-field input {
  width: 100%; padding: 11px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; color: var(--asl-white);
  font-size: 16px; font-family: var(--font-main);
  transition: border-color .2s;
}
.login-field input:focus {
  outline: none; border-color: var(--asl-accent);
  background: rgba(232,160,32,0.05);
}
.login-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(90deg, var(--asl-orange), var(--asl-accent));
  border: none; border-radius: 6px; color: #fff;
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; cursor: pointer; margin-top: 8px;
  transition: opacity .2s, transform .1s;
}
.login-btn:hover { opacity: .9; transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); }
.login-error {
  color: var(--asl-danger); font-size: 11px;
  text-align: center; margin-top: 10px; display: none;
}

/* ══ APP SHELL ══ */
#app { display: none; height: 100vh; flex-direction: column; }

/* Top bar */
#topbar {
  height: 48px; background: var(--asl-dark);
  border-bottom: 2px solid var(--asl-accent);
  display: flex; align-items: center; padding: 0 20px;
  gap: 16px; flex-shrink: 0;
}
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-logo svg { width: 80px; height: 28px; }
.topbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.1); }
.topbar-title {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-grey);
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.topbar-user {
  font-size: 11px; color: var(--asl-accent); letter-spacing: 1px;
  text-transform: uppercase;
}
.topbar-time { font-size: 11px; color: var(--asl-grey); font-variant-numeric: tabular-nums; }
.btn-logout {
  padding: 5px 12px; border: 1px solid rgba(255,255,255,0.15);
  background: transparent; color: var(--asl-grey);
  border-radius: 4px; cursor: pointer; font-size: 11px;
  transition: all .2s;
}
.btn-logout:hover { border-color: var(--asl-danger); color: var(--asl-danger); }

/* Main layout */
#main-layout { display: flex; flex: 1; overflow: hidden; }

/* ══ SIDEBAR ══ */
#sidebar {
  width: var(--sidebar-w); background: var(--asl-dark);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column; flex-shrink: 0;
  padding-top: 8px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 18px; cursor: pointer; color: var(--asl-grey);
  font-size: 12px; letter-spacing: .5px; border-left: 3px solid transparent;
  transition: all .15s; user-select: none;
}
.nav-item:hover { color: var(--asl-white); background: rgba(255,255,255,0.04); }
.nav-item.active {
  color: var(--asl-accent); border-left-color: var(--asl-accent);
  background: rgba(232,160,32,0.07);
}
.nav-icon { font-size: 15px; width: 18px; text-align: center; }
.nav-separator { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 16px; }

/* ══ CONTENT AREA ══ */
#content { flex: 1; overflow-y: auto; padding: 20px; background: #0d1e35; }

/* ══ DASHBOARD ══ */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 16px;
}
.dash-card {
  background: var(--asl-navy);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 16px;
  position: relative; overflow: hidden;
}
.dash-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.dash-card.aog::before { background: var(--asl-danger); }
.dash-card.hil::before { background: var(--asl-diff); }
.dash-card.wo::before { background: var(--asl-warn); }
.dash-card.atl::before { background: var(--asl-mid); }
.dash-card.notes::before { background: var(--asl-success); }
.dash-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.dash-card-title {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-grey);
}
.dash-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700;
}
.badge-danger { background: rgba(224,62,62,.2); color: var(--asl-danger); }
.badge-warn { background: rgba(232,160,32,.2); color: var(--asl-warn); }
.badge-diff { background: rgba(139,92,246,.2); color: var(--asl-diff); }
.badge-blue { background: rgba(30,77,140,.4); color: var(--asl-light); }
.badge-success { background: rgba(29,184,122,.2); color: var(--asl-success); }

.dash-card.notes { grid-column: span 3; }

.dash-item {
  padding: 8px 10px; background: rgba(255,255,255,0.03);
  border-radius: 6px; margin-bottom: 6px;
  cursor: pointer; transition: background .15s;
  border-left: 2px solid transparent;
}
.dash-item:hover { background: rgba(255,255,255,0.07); }
.dash-item.aog-item { border-left-color: var(--asl-danger); }
.dash-item.hil-item { border-left-color: var(--asl-diff); }
.dash-item.wo-item { border-left-color: var(--asl-warn); }
.dash-item.atl-item { border-left-color: var(--asl-mid); }
.dash-item-reg {
  font-size: 11px; font-weight: 700; color: var(--asl-accent);
  margin-bottom: 2px;
}
.dash-item-title { font-size: 11px; color: var(--asl-white); margin-bottom: 2px; }
.dash-item-meta { font-size: 10px; color: var(--asl-grey); }

.empty-state {
  text-align: center; padding: 20px; color: var(--asl-grey); font-size: 11px;
}

/* Notes area */
.notes-area {
  width: 100%; background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
  color: var(--asl-white); padding: 10px; font-size: 12px;
  font-family: var(--font-main); resize: vertical; min-height: 80px;
}
.notes-area:focus { outline: none; border-color: var(--asl-accent); }
.btn-save-note {
  margin-top: 8px; padding: 6px 16px;
  background: var(--asl-success); border: none; border-radius: 4px;
  color: #fff; font-size: 11px; font-weight: 700; cursor: pointer;
}

/* ══ MODULE VIEWS ══ */
.module-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.module-title {
  font-size: 18px; font-weight: 700; color: var(--asl-white);
  letter-spacing: .5px;
}
.module-subtitle { font-size: 11px; color: var(--asl-grey); margin-top: 2px; }

.btn-primary {
  padding: 8px 18px; background: linear-gradient(90deg, var(--asl-orange), var(--asl-accent));
  border: none; border-radius: 6px; color: #fff;
  font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: .5px;
  transition: opacity .2s;
}
.btn-primary:hover { opacity: .85; }
.btn-sm {
  padding: 4px 10px; border-radius: 4px; font-size: 11px;
  font-weight: 600; cursor: pointer; border: none; transition: opacity .2s;
}
.btn-sm:hover { opacity: .8; }
.btn-edit { background: rgba(30,77,140,.5); color: var(--asl-light); }
.btn-del { background: rgba(224,62,62,.3); color: #ff8080; }
.btn-view { background: rgba(29,184,122,.2); color: var(--asl-success); }

/* Table */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 10px 12px; font-size: 10px;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--asl-grey);
  border-bottom: 1px solid rgba(255,255,255,0.08); white-space: nowrap;
}
.data-table td {
  padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 12px; vertical-align: middle;
}
.data-table tr:hover td { background: rgba(255,255,255,0.02); }

.reg-tag {
  display: inline-block; padding: 2px 8px;
  background: rgba(232,160,32,0.15); color: var(--asl-accent);
  border-radius: 4px; font-size: 11px; font-weight: 700;
}
.status-tag {
  display: inline-block; padding: 2px 9px;
  border-radius: 10px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px;
}
.s-open { background: rgba(29,184,122,.15); color: var(--asl-success); }
.s-closed { background: rgba(138,155,181,.15); color: var(--asl-grey); }
.s-deferred { background: rgba(139,92,246,.2); color: var(--asl-diff); }
.s-aog { background: rgba(224,62,62,.2); color: var(--asl-danger); }

/* ══ MODAL ══ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal-box {
  background: #0d1e35; border: 1px solid rgba(232,160,32,0.3);
  border-radius: 12px; padding: 28px; width: 100%; max-width: 720px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,0.8);
}
.modal-title {
  font-size: 16px; font-weight: 700; margin-bottom: 20px;
  padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-close {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.07); border: none;
  color: var(--asl-grey); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: rgba(224,62,62,.3); color: #fff; }

/* Form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid.cols-1 { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: span 2; }
.form-group label {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--asl-grey);
}
.form-group input,
.form-group select,
.form-group textarea {
  padding: 9px 12px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
  color: var(--asl-white); font-size: 16px; font-family: var(--font-main);
  transition: border-color .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none; border-color: var(--asl-accent);
}
.form-group select option { background: #0d1e35; }
.form-group textarea { resize: vertical; min-height: 72px; }

.form-actions {
  display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;
}
.btn-cancel {
  padding: 8px 18px; background: transparent;
  border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
  color: var(--asl-grey); font-size: 12px; cursor: pointer;
}
.btn-cancel:hover { border-color: var(--asl-grey); }

/* Signature */
.sig-btn {
  padding: 8px 16px; background: rgba(255,255,255,0.05);
  border: 1px dashed rgba(232,160,32,0.4); border-radius: 6px;
  color: var(--asl-accent); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; gap: 8px;
}
.sig-applied {
  color: var(--asl-success); border-color: rgba(29,184,122,.4);
  background: rgba(29,184,122,.05);
}

/* Detail view */
.detail-section {
  background: var(--asl-navy); border-radius: 8px;
  padding: 16px; margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.06);
}
.detail-section-title {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-accent); margin-bottom: 12px;
}
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.detail-item label {
  display: block; font-size: 10px; color: var(--asl-grey);
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px;
}
.detail-item .val {
  font-size: 12px; color: var(--asl-white); line-height: 1.5;
}

/* HIL deadline colors */
.deadline-urgent { color: var(--asl-danger); font-weight: 700; }
.deadline-warn { color: var(--asl-warn); font-weight: 700; }
.deadline-ok { color: var(--asl-success); }

/* Contacts */
.contacts-section { margin-bottom: 28px; }
.contacts-title {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-accent); margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid rgba(232,160,32,0.2);
}
.contact-card {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 14px; background: var(--asl-navy);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
  margin-bottom: 8px;
}
.contact-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--asl-mid), var(--asl-accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.contact-name { font-size: 13px; font-weight: 600; }
.contact-role { font-size: 11px; color: var(--asl-grey); }
.contact-phone { margin-left: auto; color: var(--asl-accent); font-size: 12px; font-variant-numeric: tabular-nums; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9000;
  padding: 12px 20px; border-radius: 8px; font-size: 13px;
  font-weight: 600; opacity: 0; transform: translateY(10px);
  transition: all .3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--asl-success); color: #fff; }
.toast.error { background: var(--asl-danger); color: #fff; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

/* Filter bar */
.filter-bar {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  align-items: center;
}
.filter-btn {
  padding: 5px 14px; border-radius: 20px; font-size: 11px;
  font-weight: 600; cursor: pointer; border: 1px solid transparent;
  transition: all .15s; background: rgba(255,255,255,0.05);
  color: var(--asl-grey);
}
.filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--asl-white); }
.filter-btn.active { background: rgba(232,160,32,0.15); border-color: var(--asl-accent); color: var(--asl-accent); }
.filter-search {
  padding: 5px 12px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
  color: var(--asl-white); font-size: 12px; width: 200px;
}
.filter-search:focus { outline: none; border-color: var(--asl-accent); }

/* Historial */
.hist-card {
  background: var(--asl-navy); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px; margin-bottom: 12px; overflow: hidden;
}
.hist-header {
  padding: 12px 16px; background: rgba(255,255,255,0.03);
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.hist-body { padding: 16px; display: none; }
.hist-body.open { display: block; }
.hist-field { margin-bottom: 10px; }
.hist-field label {
  font-size: 10px; color: var(--asl-grey); letter-spacing: 1px;
  text-transform: uppercase; display: block; margin-bottom: 3px;
}
.hist-field .val { font-size: 12px; line-height: 1.6; }
.hist-manual {
  background: rgba(30,77,140,.2); border: 1px solid rgba(30,77,140,.4);
  border-radius: 6px; padding: 10px 14px; margin-top: 8px;
}
.hist-manual-title {
  font-size: 10px; color: var(--asl-accent); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 6px;
}

@media (max-width: 900px) {
  .dashboard-grid { grid-template-columns: 1fr 1fr; }
  .dash-card.notes { grid-column: span 2; }
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: span 1; }
}
@media (max-width: 600px) {
  :root { --sidebar-w: 48px; }
  #sidebar { width: 48px; overflow: hidden; }
  .nav-item { padding: 13px 0; justify-content: center; }
  .nav-item span.nav-label { display: none; }
  .nav-icon { font-size: 18px; width: auto; }
  .nav-separator { margin: 6px 8px; }
  #content { padding: 12px; }
  .dashboard-grid { grid-template-columns: 1fr; gap: 12px; }
  .dash-card.notes { grid-column: span 1; }
  .module-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .module-title { font-size: 15px; }
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: span 1; }
  .modal-box { padding: 18px; }
  .detail-grid { grid-template-columns: 1fr; }
  .data-table th, .data-table td { padding: 8px 8px; font-size: 11px; }
  .topbar-title { display: none; }
  .topbar-time { display: none; }
  #topbar { padding: 0 12px; }
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-bg-stripe"></div>
  <div class="login-box">
    <div class="login-logo">

function randWO() { return String(Math.floor(100000 + Math.random()*899999)); }

let woSearch = '', atlSearch = '', hilSearch = '';

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('login-btn');
  btn.addEventListener('click', doLogin);
  btn.addEventListener('touchend', function(e) { e.preventDefault(); doLogin(); });
});

function doLogin() {
  var u = document.getElementById('inp-user').value.trim();
  var p = document.getElementById('inp-pass').value;
  if (u === 'Pabmcc26' && p === 'Mcc26') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    startClock();
    showView('dashboard');
  } else {
    var err = document.getElementById('login-error');
    err.style.display = 'block';
    setTimeout(function(){ err.style.display='none'; }, 3000);
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});
function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
}

// ═══════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════
function startClock() {
  function tick() {
    const now = new Date(Date.now() + 3600000);
    const d = now.toUTCString().replace(' GMT','');
    document.getElementById('clock').textContent = d.split(' ').slice(1,5).join(' ') + ' LT+1';
  }
  tick(); setInterval(tick, 1000);
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function showView(view) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  const content = document.getElementById('content');
  switch(view) {
    case 'dashboard': content.innerHTML = renderDashboard(); bindDashNotes(); break;
    case 'aircraft':  content.innerHTML = renderAircraft(); break;
    case 'wo':        content.innerHTML = renderWO(); break;
    case 'atl':       content.innerHTML = renderATL(); break;
    case 'hil':       content.innerHTML = renderHIL(); break;
    case 'historial': content.innerHTML = renderHistorial(); break;
    case 'scheduler': content.innerHTML = renderScheduler(); bindScheduler(); break;
  }
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 2500);
}

function renderDashboard() {
  const aogAC = db.aircraft.filter(a => a.status === 'AOG');
  const hilUrgent = db.hil.filter(h => {
    const days = Math.ceil((new Date(h.deadline) - new Date(T)) / 86400000);
    return days <= 5 && days >= 0;
  });
  const woOpen = db.wo.filter(w => w.status === 'open');
  const atlRecent = [...db.atl].sort((a,b)=>b.id-a.id).slice(0,5);

  let aogHTML = aogAC.length ? aogAC.map(a => `
    <div class="dash-item aog-item" onclick="showView('aircraft')">
      <div class="dash-item-reg">${a.registration}</div>
      <div class="dash-item-title">${a.aircraft_type}</div>
      <div class="dash-item-meta">Status: AOG</div>
    </div>`).join('') : '<div class="empty-state">No AOG aircraft</div>';

  let hilHTML = hilUrgent.length ? hilUrgent.map(h => {
    const days = Math.ceil((new Date(h.deadline) - new Date(T)) / 86400000);
    const cls = days <= 3 ? 'deadline-urgent' : 'deadline-warn';
    return `<div class="dash-item hil-item" onclick="showView('hil');setTimeout(()=>openHILDetail(${h.id}),50)">
      <div class="dash-item-reg">${h.aircraft_reg}</div>
      <div class="dash-item-title">${h.title}</div>
      <div class="dash-item-meta">${h.hil_number} · <span class="${cls}">${days}d remaining</span></div>
    </div>`;}).join('') : '<div class="empty-state">No HIL items due soon</div>';

  let woHTML = woOpen.length ? woOpen.map(w => `
    <div class="dash-item wo-item" onclick="showView('wo');setTimeout(()=>openWODetail(${w.id}),50)">
      <div class="dash-item-reg">${w.aircraft_reg}</div>
      <div class="dash-item-title">${w.title}</div>
      <div class="dash-item-meta">WO ${w.wo_number} · ATA ${w.ata}</div>
    </div>`).join('') : '<div class="empty-state">No open work orders</div>';

  let atlHTML = atlRecent.length ? atlRecent.map(a => `
    <div class="dash-item atl-item" onclick="showView('atl');setTimeout(()=>openATLDetail(${a.id}),50)">
      <div class="dash-item-reg">${a.aircraft_reg}</div>
      <div class="dash-item-title">${a.atl_number}</div>
      <div class="dash-item-meta">${a.created_at} · ${a.status}</div>
    </div>`).join('') : '<div class="empty-state">No ATL entries</div>';

  return `
  <div class="module-header">
    <div>
      <div class="module-title">Operations Overview</div>
      <div class="module-subtitle">${new Date().toDateString()} · ATR 72-600 Fleet</div>
    </div>
  </div>
  <div class="dashboard-grid">
    <div class="dash-card aog">
      <div class="dash-card-header">
        <span class="dash-card-title">AOG</span>
        <span class="dash-badge badge-danger">${aogAC.length}</span>
      </div>
      ${aogHTML}
    </div>
    <div class="dash-card hil">
      <div class="dash-card-header">
        <span class="dash-card-title">HIL – Due Soon</span>
        <span class="dash-badge badge-diff">${hilUrgent.length}</span>
      </div>
      ${hilHTML}
    </div>
    <div class="dash-card wo">
      <div class="dash-card-header">
        <span class="dash-card-title">Work Orders Open</span>
        <span class="dash-badge badge-warn">${woOpen.length}</span>
      </div>
      ${woHTML}
    </div>
    <div class="dash-card atl">
      <div class="dash-card-header">
        <span class="dash-card-title">ATL – Recent</span>
        <span class="dash-badge badge-blue">${atlRecent.length}</span>
      </div>
      ${atlHTML}
    </div>
    <div class="dash-card notes" style="grid-column:span 2">
      <div class="dash-card-header">
        <span class="dash-card-title">Shift Relay / Annotations / Queries</span>
        <span class="dash-badge badge-success">Notes</span>
      </div>
      <textarea class="notes-area" id="notesArea" placeholder="Enter shift relay notes, queries or annotations here...">${db.notes}</textarea>
      <button class="btn-save-note" onclick="saveNotes()">💾 Save Notes</button>
    </div>
  </div>`;
}

function saveAircraft(id) {
  const data = {
    registration: document.getElementById('f-reg').value,
    msn: document.getElementById('f-msn').value,
    aircraft_type: document.getElementById('f-type').value,
    operator: document.getElementById('f-op').value,
    status: document.getElementById('f-sta').value,
    total_hours: document.getElementById('f-th').value,

  if (id) { Object.assign(db.aircraft.find(a=>a.id===id), data); }

function renderHIL() {

    const matchSearch = !hilSearch || h.hil_number.includes(hilSearch) || h.aircraft_reg.includes(hilSearch) || h.title.toLowerCase().includes(hilSearch);
    return matchFilter && matchSearch;
  });
  const rows = filtered.map(h => {
    const days = Math.ceil((new Date(h.deadline) - new Date(T)) / 86400000);

    return `<tr onclick="openHILDetail(${h.id})" style="cursor:pointer">

    <thead><tr><th>Time</th><th>Title</th><th>Message</th><th>Status</th><th>Del</th></tr></thead>
    <tbody id="sch-rows">${rows}</tbody>
  </table></div>`;
}

function bindScheduler() {
  document.getElementById('sch-add-btn').addEventListener('click', addSchedule);
  checkNotifPermission();
}

function checkNotifPermission() {
  const el = document.getElementById('notif-permission');
  if (!el) return;
  if (!('Notification' in window)) {
    el.innerHTML = '<span style="color:var(--asl-danger)">⚠ Notifications not supported in this browser. Use Safari and add to Home Screen.</span>';
    return;
  }
  if (Notification.permission === 'granted') {
    el.innerHTML = '<span style="color:var(--asl-success)">✔ Notifications enabled</span>';
  } else if (Notification.permission === 'denied') {
    el.innerHTML = '<span style="color:var(--asl-danger)">✘ Notifications blocked. Enable in iPhone Settings → Safari → Notifications.</span>';
  } else {
    el.innerHTML = '<span style="color:var(--asl-warn)">⚠ Permission needed. <button class="btn-sm btn-edit" onclick="requestNotifPermission()">Enable Notifications</button></span>';
  }
}

function requestNotifPermission() {
  Notification.requestPermission().then(p => {
    checkNotifPermission();
    if (p === 'granted') showToast('Notifications enabled!', 'success');
  });
}

function addSchedule() {
  const time = document.getElementById('sch-time').value;
  const title = document.getElementById('sch-title').value.trim();
  const body = document.getElementById('sch-body').value.trim() || 'ASL Tech Support';

  if (!time) { showToast('Select a time', 'error'); return; }
  if (!title) { showToast('Enter a title', 'error'); return; }

  const now = new Date();
  const [h, m] = time.split(':').map(Number);
  const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
  if (target <= now) target.setDate(target.getDate() + 1); // next day if past
  const delay = target - now;

  const entry = { time, title, body, fired: false, target: target.toISOString() };
  schedules.push(entry);
  const idx = schedules.length - 1;

  // Schedule via SW if available, else fallback to setTimeout
  if (swReg && Notification.permission === 'granted') {
    swReg.active.postMessage({ type: 'SCHEDULE', title, body, delay });
  } else if (Notification.permission === 'granted') {
    schedTimers.push(setTimeout(() => {
      new Notification(title, { body, icon: './ASL_icon.png' });
      schedules[idx].fired = true;
    }, delay));
  } else {
    requestNotifPermission();
  }

  const mins = Math.round(delay / 60000);
  showToast(`Scheduled in ${mins} min`, 'success');
  showView('scheduler');
}

function deleteSchedule(i) {
  schedules.splice(i, 1);
  showView('scheduler');
  showToast('Deleted', 'success');
}
