<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>ASL Technical Support Platform</title>
<!-- ASL_TechSupport_v15 · 30 May 2026 · ASL Aviation Belgium MRO · ATR 72-600 -->
<!-- 10 modules: Dashboard · Aircraft · WO · ATL · HIL · Historial · Contactos · Email · Reports · Scheduler -->
<!-- Versioning convention (NOVARA-style): filename + APP_VERSION in code. GitHub file stays index.html -->
<link rel="manifest" href="/asl-tech-support/manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a1628'/%3E%3Cpolygon points='6,32 22,12 28,12 12,32 28,52 22,52' fill='%23f26522'/%3E%3Cpolygon points='14,32 28,15 33,15 19,32 33,49 28,49' fill='%23e8a020' opacity='.75'/%3E%3Ctext x='34' y='38' font-family='Arial Black,Arial' font-size='18' font-weight='900' fill='%23f0f4fa' letter-spacing='1'%3EASL%3C/text%3E%3Crect x='34' y='41' width='26' height='2' fill='%23e8a020' opacity='.6'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%230a1628'/%3E%3Cpolygon points='14,90 58,34 74,34 30,90 74,146 58,146' fill='%23f26522'/%3E%3Cpolygon points='36,90 74,38 86,38 48,90 86,142 74,142' fill='%23e8a020' opacity='.75'/%3E%3Ctext x='92' y='108' font-family='Arial Black,Arial' font-size='52' font-weight='900' fill='%23f0f4fa' letter-spacing='2'%3EASL%3C/text%3E%3Crect x='92' y='116' width='76' height='4' fill='%23e8a020' opacity='.6'/%3E%3C/svg%3E">
<style>
:root {
  --asl-navy: #0a1628;
  --asl-blue: #1a3a6e;
  --asl-mid: #1e4d8c;
  --asl-accent: #e8a020;
  --asl-orange: #f26522;
  --asl-light: #d4e4f7;
  --asl-white: #f0f4fa;
  --asl-grey: #8a9bb5;
  --asl-dark: #060e1c;
  --asl-success: #1db87a;
  --asl-danger: #e03e3e;
  --asl-warn: #e8a020;
  --asl-diff: #8b5cf6;
  --sidebar-w: 200px;
  --font-main: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-main);
  background: var(--asl-navy);
  color: var(--asl-white);
  min-height: 100vh;
  font-size: 13px;
}

/* ══ LOGIN ══ */
#login-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, var(--asl-dark) 0%, var(--asl-navy) 50%, #0d2147 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.login-bg-stripe {
  position: absolute; top: 0; left: 0; width: 100%; height: 6px;
  background: linear-gradient(90deg, var(--asl-orange), var(--asl-accent), var(--asl-mid));
}
.login-box {
  background: rgba(10,22,40,0.95);
  border: 1px solid rgba(232,160,32,0.3);
  border-radius: 12px;
  padding: 48px 40px 40px;
  width: 380px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  position: relative;
}
.login-logo {
  text-align: center; margin-bottom: 32px;
}
.logo-svg { width: 200px; height: 70px; }
.login-subtitle {
  text-align: center; color: var(--asl-grey); font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px;
  border-top: 1px solid rgba(255,255,255,0.08); padding-top: 16px;
}
.login-field { margin-bottom: 16px; }
.login-field label {
  display: block; font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--asl-grey); margin-bottom: 6px;
}
.login-field input {
  width: 100%; padding: 11px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; color: var(--asl-white);
  font-size: 16px; font-family: var(--font-main);
  transition: border-color .2s;
}
.login-field input:focus {
  outline: none; border-color: var(--asl-accent);
  background: rgba(232,160,32,0.05);
}
.login-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(90deg, var(--asl-orange), var(--asl-accent));
  border: none; border-radius: 6px; color: #fff;
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; cursor: pointer; margin-top: 8px;
  transition: opacity .2s, transform .1s;
}
.login-btn:hover { opacity: .9; transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); }
.login-error {
  color: var(--asl-danger); font-size: 11px;
  text-align: center; margin-top: 10px; display: none;
}

/* ══ APP SHELL ══ */
#app { display: none; height: 100vh; flex-direction: column; }

/* Top bar */
#topbar {
  height: 48px; background: var(--asl-dark);
  border-bottom: 2px solid var(--asl-accent);
  display: flex; align-items: center; padding: 0 20px;
  gap: 16px; flex-shrink: 0;
}
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-logo svg { width: 80px; height: 28px; }
.topbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.1); }
.topbar-title {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-grey);
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.topbar-user {
  font-size: 11px; color: var(--asl-accent); letter-spacing: 1px;
  text-transform: uppercase;
}
.topbar-time { font-size: 11px; color: var(--asl-grey); font-variant-numeric: tabular-nums; }
.btn-logout {
  padding: 5px 12px; border: 1px solid rgba(255,255,255,0.15);
  background: transparent; color: var(--asl-grey);
  border-radius: 4px; cursor: pointer; font-size: 11px;
  transition: all .2s;
}
.btn-logout:hover { border-color: var(--asl-danger); color: var(--asl-danger); }

/* Main layout */
#main-layout { display: flex; flex: 1; overflow: hidden; }

/* ══ SIDEBAR ══ */
#sidebar {
  width: var(--sidebar-w); background: var(--asl-dark);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column; flex-shrink: 0;
  padding-top: 8px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 18px; cursor: pointer; color: var(--asl-grey);
  font-size: 12px; letter-spacing: .5px; border-left: 3px solid transparent;
  transition: all .15s; user-select: none;
}
.nav-item:hover { color: var(--asl-white); background: rgba(255,255,255,0.04); }
.nav-item.active {
  color: var(--asl-accent); border-left-color: var(--asl-accent);
  background: rgba(232,160,32,0.07);
}
.nav-icon { font-size: 15px; width: 18px; text-align: center; }
.nav-separator { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 16px; }

/* ══ CONTENT AREA ══ */
#content { flex: 1; overflow-y: auto; padding: 20px; background: #0d1e35; }

/* ══ DASHBOARD ══ */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 16px;
}
.dash-card {
  background: var(--asl-navy);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 16px;
  position: relative; overflow: hidden;
}
.dash-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.dash-card.aog::before { background: var(--asl-danger); }
.dash-card.hil::before { background: var(--asl-diff); }
.dash-card.wo::before { background: var(--asl-warn); }
.dash-card.atl::before { background: var(--asl-mid); }
.dash-card.notes::before { background: var(--asl-success); }
.dash-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.dash-card-title {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-grey);
}
.dash-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700;
}
.badge-danger { background: rgba(224,62,62,.2); color: var(--asl-danger); }
.badge-warn { background: rgba(232,160,32,.2); color: var(--asl-warn); }
.badge-diff { background: rgba(139,92,246,.2); color: var(--asl-diff); }
.badge-blue { background: rgba(30,77,140,.4); color: var(--asl-light); }
.badge-success { background: rgba(29,184,122,.2); color: var(--asl-success); }

.dash-card.notes { grid-column: span 3; }

.dash-item {
  padding: 8px 10px; background: rgba(255,255,255,0.03);
  border-radius: 6px; margin-bottom: 6px;
  cursor: pointer; transition: background .15s;
  border-left: 2px solid transparent;
}
.dash-item:hover { background: rgba(255,255,255,0.07); }
.dash-item.aog-item { border-left-color: var(--asl-danger); }
.dash-item.hil-item { border-left-color: var(--asl-diff); }
.dash-item.wo-item { border-left-color: var(--asl-warn); }
.dash-item.atl-item { border-left-color: var(--asl-mid); }
.dash-item-reg {
  font-size: 11px; font-weight: 700; color: var(--asl-accent);
  margin-bottom: 2px;
}
.dash-item-title { font-size: 11px; color: var(--asl-white); margin-bottom: 2px; }
.dash-item-meta { font-size: 10px; color: var(--asl-grey); }

.empty-state {
  text-align: center; padding: 20px; color: var(--asl-grey); font-size: 11px;
}

/* Notes area */
.notes-area {
  width: 100%; background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
  color: var(--asl-white); padding: 10px; font-size: 12px;
  font-family: var(--font-main); resize: vertical; min-height: 80px;
}
.notes-area:focus { outline: none; border-color: var(--asl-accent); }
.btn-save-note {
  margin-top: 8px; padding: 6px 16px;
  background: var(--asl-success); border: none; border-radius: 4px;
  color: #fff; font-size: 11px; font-weight: 700; cursor: pointer;
}

/* ══ MODULE VIEWS ══ */
.module-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.module-title {
  font-size: 18px; font-weight: 700; color: var(--asl-white);
  letter-spacing: .5px;
}
.module-subtitle { font-size: 11px; color: var(--asl-grey); margin-top: 2px; }

.btn-primary {
  padding: 8px 18px; background: linear-gradient(90deg, var(--asl-orange), var(--asl-accent));
  border: none; border-radius: 6px; color: #fff;
  font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: .5px;
  transition: opacity .2s;
}
.btn-primary:hover { opacity: .85; }
.btn-sm {
  padding: 4px 10px; border-radius: 4px; font-size: 11px;
  font-weight: 600; cursor: pointer; border: none; transition: opacity .2s;
}
.btn-sm:hover { opacity: .8; }
.btn-edit { background: rgba(30,77,140,.5); color: var(--asl-light); }
.btn-del { background: rgba(224,62,62,.3); color: #ff8080; }
.btn-view { background: rgba(29,184,122,.2); color: var(--asl-success); }

/* Table */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 10px 12px; font-size: 10px;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--asl-grey);
  border-bottom: 1px solid rgba(255,255,255,0.08); white-space: nowrap;
}
.data-table td {
  padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 12px; vertical-align: middle;
}
.data-table tr:hover td { background: rgba(255,255,255,0.02); }

.reg-tag {
  display: inline-block; padding: 2px 8px;
  background: rgba(232,160,32,0.15); color: var(--asl-accent);
  border-radius: 4px; font-size: 11px; font-weight: 700;
}
.status-tag {
  display: inline-block; padding: 2px 9px;
  border-radius: 10px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px;
}
.s-open { background: rgba(29,184,122,.15); color: var(--asl-success); }
.s-closed { background: rgba(138,155,181,.15); color: var(--asl-grey); }
.s-deferred { background: rgba(139,92,246,.2); color: var(--asl-diff); }
.s-aog { background: rgba(224,62,62,.2); color: var(--asl-danger); }

/* ══ MODAL ══ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal-box {
  background: #0d1e35; border: 1px solid rgba(232,160,32,0.3);
  border-radius: 12px; padding: 28px; width: 100%; max-width: 720px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,0.8);
}
.modal-title {
  font-size: 16px; font-weight: 700; margin-bottom: 20px;
  padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-close {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.07); border: none;
  color: var(--asl-grey); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: rgba(224,62,62,.3); color: #fff; }

/* Form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid.cols-1 { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: span 2; }
.form-group label {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--asl-grey);
}
.form-group input,
.form-group select,
.form-group textarea {
  padding: 9px 12px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
  color: var(--asl-white); font-size: 16px; font-family: var(--font-main);
  transition: border-color .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none; border-color: var(--asl-accent);
}
.form-group select option { background: #0d1e35; }
.form-group textarea { resize: vertical; min-height: 72px; }

.form-actions {
  display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;
}
.btn-cancel {
  padding: 8px 18px; background: transparent;
  border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
  color: var(--asl-grey); font-size: 12px; cursor: pointer;
}
.btn-cancel:hover { border-color: var(--asl-grey); }

/* Signature */
.sig-btn {
  padding: 8px 16px; background: rgba(255,255,255,0.05);
  border: 1px dashed rgba(232,160,32,0.4); border-radius: 6px;
  color: var(--asl-accent); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; gap: 8px;
}
.sig-applied {
  color: var(--asl-success); border-color: rgba(29,184,122,.4);
  background: rgba(29,184,122,.05);
}

/* Detail view */
.detail-section {
  background: var(--asl-navy); border-radius: 8px;
  padding: 16px; margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.06);
}
.detail-section-title {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-accent); margin-bottom: 12px;
}
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.detail-item label {
  display: block; font-size: 10px; color: var(--asl-grey);
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px;
}
.detail-item .val {
  font-size: 12px; color: var(--asl-white); line-height: 1.5;
}

/* HIL deadline colors */
.deadline-urgent { color: var(--asl-danger); font-weight: 700; }
.deadline-warn { color: var(--asl-warn); font-weight: 700; }
.deadline-ok { color: var(--asl-success); }

/* Contacts */
.contacts-section { margin-bottom: 28px; }
.contacts-title {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--asl-accent); margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid rgba(232,160,32,0.2);
}
.contact-card {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 14px; background: var(--asl-navy);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
  margin-bottom: 8px;
}
.contact-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--asl-mid), var(--asl-accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.contact-name { font-size: 13px; font-weight: 600; }
.contact-role { font-size: 11px; color: var(--asl-grey); }
.contact-phone { margin-left: auto; color: var(--asl-accent); font-size: 12px; font-variant-numeric: tabular-nums; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9000;
  padding: 12px 20px; border-radius: 8px; font-size: 13px;
  font-weight: 600; opacity: 0; transform: translateY(10px);
  transition: all .3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--asl-success); color: #fff; }
.toast.error { background: var(--asl-danger); color: #fff; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

/* Filter bar */
.filter-bar {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  align-items: center;
}
.filter-btn {
  padding: 5px 14px; border-radius: 20px; font-size: 11px;
  font-weight: 600; cursor: pointer; border: 1px solid transparent;
  transition: all .15s; background: rgba(255,255,255,0.05);
  color: var(--asl-grey);
}
.filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--asl-white); }
.filter-btn.active { background: rgba(232,160,32,0.15); border-color: var(--asl-accent); color: var(--asl-accent); }
.filter-search {
  padding: 5px 12px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
  color: var(--asl-white); font-size: 12px; width: 200px;
}
.filter-search:focus { outline: none; border-color: var(--asl-accent); }

/* Historial */
.hist-card {
  background: var(--asl-navy); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px; margin-bottom: 12px; overflow: hidden;
}
.hist-header {
  padding: 12px 16px; background: rgba(255,255,255,0.03);
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.hist-body { padding: 16px; display: none; }
.hist-body.open { display: block; }
.hist-field { margin-bottom: 10px; }
.hist-field label {
  font-size: 10px; color: var(--asl-grey); letter-spacing: 1px;
  text-transform: uppercase; display: block; margin-bottom: 3px;
}
.hist-field .val { font-size: 12px; line-height: 1.6; }
.hist-manual {
  background: rgba(30,77,140,.2); border: 1px solid rgba(30,77,140,.4);
  border-radius: 6px; padding: 10px 14px; margin-top: 8px;
}
.hist-manual-title {
  font-size: 10px; color: var(--asl-accent); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 6px;
}

@media (max-width: 900px) {
  .dashboard-grid { grid-template-columns: 1fr 1fr; }
  .dash-card.notes { grid-column: span 2; }
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: span 1; }
}
@media (max-width: 600px) {
  :root { --sidebar-w: 48px; }
  #sidebar { width: 48px; overflow: hidden; }
  .nav-item { padding: 13px 0; justify-content: center; }
  .nav-item span.nav-label { display: none; }
  .nav-icon { font-size: 18px; width: auto; }
  .nav-separator { margin: 6px 8px; }
  #content { padding: 12px; }
  .dashboard-grid { grid-template-columns: 1fr; gap: 12px; }
  .dash-card.notes { grid-column: span 1; }
  .module-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .module-title { font-size: 15px; }
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: span 1; }
  .modal-box { padding: 18px; }
  .detail-grid { grid-template-columns: 1fr; }
  .data-table th, .data-table td { padding: 8px 8px; font-size: 11px; }
  .topbar-title { display: none; }
  .topbar-time { display: none; }
  #topbar { padding: 0 12px; }
}
</style>
</head>

  wo: [
    { id:1, wo_number:'483921', ata:'32-40', title:'NLG Door Actuator – Wear Check', defect:'NLG door actuator rod end showing excessive wear, play detected during functional test.', corrective_action:'Removed actuator assembly per AMM 32-40-15. Inspected rod end: wear exceeded serviceable limit (>0.5 mm play). Replaced with P/N ATR32-40-15A s/n 04817. Functional test satisfactory. Torque applied per table.', engineer:'P. Slomas', signature:'MccPab26', wp_reference:'WP-ATR-0032-004', aircraft_reg:'EI-HAG', created_at:'2024-09-14', closed_at:'2024-09-15', status:'closed' },
    { id:2, wo_number:'762054', ata:'28-20', title:'Fuel Quantity Indication – LH Wing', defect:'LH wing fuel quantity reading inconsistent, oscillating ±80 kg during level flight.', corrective_action:'Checked fuel probe wiring per AMM 28-20-10. Found connector J1 at rib station 6 corroded. Cleaned with MIL-C-81302 solvent. Connector re-seated and safety-wired. BITE test confirmed: no fault codes. Ground test satisfactory.', engineer:'P. Slomas', signature:'MccPab26', wp_reference:'WP-ATR-0028-002', aircraft_reg:'EI-HAB', created_at:'2024-09-20', closed_at:'2024-09-21', status:'closed' },
    { id:3, wo_number:'319047', ata:'21-26', title:'Avionics Bay Cooling Fan Replacement', defect:'Avionics bay cooling fan #2 (P/N 21-26-08) inoperative – seized bearing.', corrective_action:'Removed fan unit per AMM 21-26-08 Rev 12. Installed new fan P/N 21-26-08A s/n 00349. Electrical connections verified per SID 21.048. Operational test performed: airflow measured 120 CFM (min 100 CFM per limits). BITE clear.', engineer:'P. Slomas', signature:'MccPab26', wp_reference:'WP-ATR-0021-008', aircraft_reg:'EI-GUO', created_at:'2024-10-02', closed_at:'2024-10-02', status:'closed' },
    { id:4, wo_number:'581736', ata:'34-11', title:'ILS Localizer – VOR/LOC Discrepancy', defect:'Crew reported LOC needle off-centre by 2 dots compared to captain side during ILS approach BRU RWY25L.', corrective_action:'Tested ILS per AMM 34-11-10. FO side signal cable J34-11-B2 found micro-fractured at connector. Replaced RG-400 coax segment (1.2m). Re-tested: CRS error <0.1 dot. Avionics release per CAME 34-BITE-04.', engineer:'P. Slomas', signature:'MccPab26', wp_reference:'WP-ATR-0034-011', aircraft_reg:'EI-HAG', created_at:'2024-10-08', closed_at:'2024-10-09', status:'closed' },
    { id:5, wo_number:'204813', ata:'24-21', title:'IDG #1 Oil Level Low', defect:'ECAM advisory IDG 1 OIL LO on departure BRU. Oil level confirmed below MIN mark on sight glass.', corrective_action:'Serviced IDG #1 with MIL-PRF-7808L oil per AMM 24-21-12. Added 0.4 qt to bring level to MAX mark. Checked for leaks: none found. Engine run performed, IDG advisory clear after 3 min. CRS issued.', engineer:'P. Slomas', signature:'MccPab26', wp_reference:'WP-ATR-0024-021', aircraft_reg:'EI-HAB', created_at:'2024-10-15', closed_at:'2024-10-15', status:'closed' },
    { id:6, wo_number:'937462', ata:'27-21', title:'Aileron Control Cable – Tension Adjustment', defect:'Aileron rigging check during C-Check revealed LH aileron cable tension at 43 lb (limit 55–75 lb).', corrective_action:'Re-rigged aileron control system per AMM 27-21-03. Cable tension adjusted to 65 lb (within 55–75 lb limit). Turnbuckle lock-wired per standard. Full travel check: UP 25° / DN 15° – within tolerance. Duplicate inspection completed.', engineer:'P. Slomas', signature:'MccPab26', wp_reference:'WP-ATR-0027-003', aircraft_reg:'EI-GUO', created_at:'2024-10-22', closed_at:'2024-10-23', status:'closed' },
    { id:7, wo_number:'645290', ata:'52-10', title:'FWD Cargo Door – Seal Replacement', defect:'Air leak detected at FWD cargo door upper seal during pressurisation check. Leak rate 2.4 lb/min (limit <1.0 lb/min).', corrective_action:'Removed and replaced door perimeter seal P/N ATR52-10-SEA-02 per AMM 52-10-07. Door adjusted: clearance gap 2 mm uniform (limit 1.5–3 mm). Pressurisation check repeated: leak rate 0.3 lb/min – within limits.', engineer:'P. Slomas', signature:'MccPab26', wp_reference:'WP-ATR-0052-010', aircraft_reg:'EI-HAG', created_at:'2024-11-03', closed_at:'2024-11-03', status:'closed' },
    { id:8, wo_number:'158374', ata:'79-21', title:'Oil Cooler – Engine #2 Blockage', defect:'ENG 2 OIL TEMP ECAM advisory during climb. Oil temp reached 155°C (max 145°C normal ops).', corrective_action:'Removed oil cooler P/N ATR79-21-OC per AMM 79-21-10. Flushed cooler with Turco 4338-L solvent. Core partially blocked (estimated 30%). Blockage cleared. Reinstalled with new gaskets. Post-engine run: oil temp 118°C at cruise power – within normal range.', engineer:'P. Slomas', signature:'MccPab26', wp_reference:'WP-ATR-0079-021', aircraft_reg:'EI-HAB', created_at:'2024-11-10', closed_at:'2024-11-11', status:'closed' },
    { id:9, wo_number:'523011', ata:'52-30', title:'FWD Cargo Door Seal R&R – Pack 1 Root Cause', defect:'Recurring PACK 1 FAULT in cruise (outlet 115°C, TCV 1 fully open) persisting after TCV 1 replacement. Night inspection found FWD cargo door perimeter seal worn (12 cm lower left quadrant, hardness >90 Shore A vs 85 limit) with salt crystal deposits on actuator rod seal — evidence of marine air infiltration during pressurisation. Root cause of Pack 1 fault: cold air infiltration via failed door seal, not TCV. ATA 52-31 seal warning advisory stored in BITE.', corrective_action:'FWD cargo door seal removed and replaced per AMM 52-30-11. Wear confirmed: 12 cm section lower left quadrant, elevated hardness, abrasion pattern from repetitive pressurisation loading. Actuator rod seal area cleaned (salt deposits), shaft undamaged. New seal installed, torque sequence completed. Pressurisation ground leak check per AMM 52-30-00: differential 4.5 psi, no audible leak, no smoke dispersion, door periphery sealed – PASS. Pack 1 ground functional check: outlet 76°C (vs 115°C in flight), TCV 1 modulating 40-60% normally, no ECAM – PASS. Engineering approved task; TCV 1 left installed (serviceable). Engineering monitoring instruction issued for green hydraulic pump case drain temp trend (71°C avg → 78°C, limit 85°C) – borescope and load test scheduled at next A-check.', engineer:'P. Slomas', signature:'MccPab26', wp_reference:'WP-ATR-0052-030', aircraft_reg:'EC-NMR', created_at:T+' 11:16', closed_at:T+' 15:52', status:'closed' },
  ],
  atl: [
    { id:1, atl_number:'ATL-881203', pilot_report:'Landing gear warning light intermittent during transit BRU-CDG. GEAR UNSAFE indication 3 sec after gear up selection, then normal.', certifying_action:'Inspected micro-switch on LH MLG uplatch per AMM 32-60-05. Found micro-switch gap 0.9 mm (limit 0.3–0.7 mm). Adjusted to 0.5 mm. Functional test: 5 cycles, no fault. BITE clear.', crs:'CRS issued: Work carried out in accordance with AMM 32-60-05 Rev 14. Aircraft released to service by authorised certifying staff. AME Lic B1.1 – EASA.145.0419.', aircraft_reg:'EI-HAG', created_at:'2024-11-20', status:'closed' },
    { id:2, atl_number:'ATL-334751', pilot_report:'ANTI SKID FAULT ECAM message during landing roll BRU. Braking felt normal.', certifying_action:'Tested anti-skid system per TSM 32-43-00. BITE identified fault on WHL 3 speed transducer. Replaced transducer P/N 32-43-T3 per AMM 32-43-04. System test: all channels normal.', crs:'CRS issued: Work carried out per AMM 32-43-04 Rev 9. Aircraft released to service. AME Lic B1.1 – EASA.145.0419.', aircraft_reg:'EI-HAB', created_at:'2024-11-22', status:'closed' },
    { id:3, atl_number:'ATL-509617', pilot_report:'Slight vibration felt in rudder pedals above 200 KIAS during climb.', certifying_action:'Inspected rudder mechanical system per AMM 27-31-00. Found aft rudder pushrod rod-end bearing worn (axial play 1.1 mm, limit 0.8 mm). Replaced bearing per AMM 27-31-12. Rigging check satisfactory.', crs:'CRS issued: Work per AMM 27-31-12 Rev 7. Aircraft released. AME Lic B1.1 – EASA.145.0419.', aircraft_reg:'EI-GUO', created_at:'2024-11-25', status:'open' },
    { id:4, atl_number:'ATL-294017', pilot_report:'GREEN HYD LO PR ECAM in cruise FL180, approx 4 min, pressure dropped to 1,950 psi (ECAM limit 2,000 psi), spontaneous recovery to 2,850 psi on descent. Crew applied QRH 29-11.', certifying_action:'Ground check post-flight: green hydraulic 3,000 psi, no visible leaks, level correct. BITE: no stored faults ATA 29. Green hydraulic pump case drain temp 78°C (limit 85°C) — upper range. Trend reviewed with Engineering: 10-sector avg 71°C, last three 74-76-78°C (gradual rise, within limits). No fault codes, no delta-P abnormality, no fluid loss. Assessed as early pump wear / transient event, not structural leak. No immediate replacement — monitoring per Engineering instruction, borescope + load test at next A-check.', crs:'Deferred to HIL for monitoring. Engineering monitoring instruction issued. Not a release blocker. AME Lic B1.1 – EASA.145.0419.', aircraft_reg:'EC-NMR', created_at:T+' 11:16', status:'closed' },
    { id:5, atl_number:'ATL-417603', pilot_report:'PACK 1 FAULT ECAM in cruise FL160, OAT -18°C. Pack 1 outlet 115°C (limit 100°C), TCV 1 fully open, bleed normal. Auto-switchover to pack 2. Fault cleared on descent. Recurring — TCV 1 previously replaced by prior tech, fault reappeared next sector.', certifying_action:'ACMS review: Pack 1 outlet 115°C, TCV 1 fully open, Eng 1 bleed nominal 46 psi. Ground check: Pack 1 outlet 78°C, TCV 1 stroke test PASS, bleed normal. Cruise-only pattern + ineffective TCV replacement indicated external cause. Correlated with stored ATA 52-31 cargo door seal advisory. Root cause identified: failed FWD cargo door seal causing cold air infiltration to pack inlet under pressurisation. Corrected via WO 523011 (AMM 52-30-11 seal R&R). Post-fix Pack 1 ground functional: outlet 76°C, TCV modulating 40-60% normally, no ECAM.', crs:'CRS issued: Root cause corrected per AMM 52-30-11 (ref WO 523011). Pack 1 functional check satisfactory. Aircraft released to service. AME Lic B1.1 – EASA.145.0419.', aircraft_reg:'EC-NMR', created_at:T+' 15:52', status:'closed' },
    { id:6, atl_number:'ATL-602714', pilot_report:'Telephone call from Capt. Manon (EI-HAB, sector LPA-TFN), cruise FL170, 10:27Z. Reported a cascade of unrelated CCAS cautions over approx 3 min: first AUTO-FEATHER caution with master caution, then a spurious A-ICE (airframe de-ice) fault with no icing present (OAT +9C, dry air), then a FUEL crossfeed advisory and an EFIS reconfiguration on the FO side. AP self-disconnected once with no input. No system genuinely degraded - boots not commanded, fuel balanced, both engines and PEC nominal. Multiple simultaneous, non-corroborated cautions pointed to a Multifunction Computer (MFC 1) processing fault rather than real failures. Captain requested Technical Support assessment before continuing.', certifying_action:'Assessment: MFC 1 latch-up. The MFC generates and routes CCAS cautions and hosts anti-ice, fuel and lighting logic, so a single MFC processor fault presents as multiple unrelated cautions with no real system degradation (TSM 31-50-00 / 31-52). Confirmed with crew that every flagged system was physically nominal: no boot inflation, fuel balanced, both PEC and engine parameters normal, no genuine AP malfunction beyond the single nuisance disconnect. Advised crew to apply the FCOM/QRH MFC 1 RESET (MFC 1 P/B OFF 10 s then ON) per QRH 31. Post-reset at 10:58Z all spurious cautions cleared, FO EFIS reconfigured to normal, AP re-engaged and held with no recurrence through to landing at 11:14Z. Single in-flight nuisance reset within FCOM provisions; no MEL item applicable as no system is dispatch-affected. Ground task raised: download MFC 1 BITE on arrival and, if a hard fault code is latched, replace MFC 1 module per AMM 31-52-11. Aircraft assessed serviceable to continue.', crs:'Cleared for continued operation. Spurious CCAS cautions traced to MFC 1 processing fault; resolved by FCOM/QRH MFC 1 reset (ref QRH 31, TSM 31-50-00). All systems confirmed physically nominal in flight. No MEL item applicable. Ground MFC 1 BITE download / module assessment raised for arrival. AME Lic B1.1 - EASA.145.0419.', aircraft_reg:'EI-HAB', created_at:T+' 10:27', status:'closed' },
    { id:7, atl_number:'ATL-715388', pilot_report:'Telephone call from Peter (onboard certifying staff) during turnaround at LPA, 11:29Z. Two items raised on EI-GUO (sector TFN-LPA). PROBLEM 1 (annotated by Capt. Manon): AFCS - repeated uncommanded autopilot pitch disconnects with FD bar removal during climb between FL120 and FL180 (3 occurrences). AP re-engaged each time; remainder of climb flown manually then re-coupled in cruise without further event. No trim runaway, pitch control normal throughout. PROBLEM 2 (pending Technical Support disposition): YAW DAMPER FAULT ECAM in cruise FL180, latched; YD would not re-arm after recycle. Mild Dutch-roll tendency reported with YD off. Peter requested Technical Support determination and MEL position before the next sector.', certifying_action:'PROBLEM 1 - AFCS pitch disconnects: reviewed with crew and AFCS BITE (TSM 22-10-00). Disconnects confined to the FL120-FL180 band with FD bars removed at each event = AFCS monitor trip, not a servo runaway. No stored hard fault, pitch trim and elevator nominal, no recurrence in cruise. Assessed as an intermittent AFCS pitch-channel monitor trip (known transient). AFCS/FDS reset performed on ground per AMM 22-10-12, BITE re-run clear. No dispatch-affecting fault; pitch-channel functional check satisfactory. Item closed - monitor; if recurrence, replace AFCS computer per AMM 22-10-14. PROBLEM 2 - Yaw Damper fault: interrogated YD per TSM 22-20-00. BITE latched a genuine YD computer channel fault (rate-gyro input fail) and YD would not re-arm = real failure, not nuisance. Yaw damper cannot be restored at line. Resolved per MEL 22-20-01 (Cat C): dispatch permitted with Yaw Damper inoperative provided (i) crew briefed that Dutch-roll damping is lost and manual rudder coordination is required, (ii) operation in moderate or greater turbulence avoided where practicable, (iii) autopilot remains available for normal ops. YD selected OFF and collared, INOP placard fitted. Deferred to HIL (HIL-448120) for YD computer replacement P/N 22-20-YDC, MEL Cat C interval max 10 days. Aircraft released to service under MEL at 12:42Z.', crs:'Released to service. PROBLEM 1 (AFCS pitch disconnects) assessed as intermittent monitor trip; AFCS/FDS reset per AMM 22-10-12, BITE clear, no dispatch fault - monitor. PROBLEM 2 (Yaw Damper fault) confirmed genuine YD channel failure per TSM 22-20-00; dispatched per MEL 22-20-01 Cat C with YD inoperative, placarded and collared, deferred to HIL-448120 for YD computer R&R (max 10 days). AME Lic B1.1 - EASA.145.0419.', aircraft_reg:'EI-GUO', created_at:T+' 11:29', status:'closed' },
  ],
  hil: [
    { id:1, hil_number:'HIL-771042', ata:'32-42', title:'NLG Steering Shimmy Damper – Leaking', description:'NLG shimmy damper found with hydraulic fluid seeping from lower gland seal during pre-flight inspection.', aircraft_reg:'EI-HAG', atl_wo_ref:'ATL-881203 / WO-483921', reason:'Leak rate within acceptable limit for continued operation per MEL 32-42-1.', mel_cat:'B', mel_ref:'32-42-1-A', mel_ata:'32', mel_item:'42', mel_sub:'1', mel_point:'A', interval_fh:'0', interval_dy:'3', deadline: addDays(T, 3), signature:'MccPab26', reply_solution:'Pending replacement at next maintenance opportunity – BRU base.', reply_station:'BRU', reply_date:'', reply_sig:'' },
    { id:2, hil_number:'HIL-290583', ata:'24-22', title:'AC Bus 2 – Tie Relay Intermittent', description:'Intermittent ELEC AC BUS 2 FAULT ECAM advisory. Fault not reproducible on ground. Suspected relay contacts.', aircraft_reg:'EI-HAB', atl_wo_ref:'ATL-334751', reason:'System fully functional. Per MEL 24-22-1, deferred pending replacement.', mel_cat:'C', mel_ref:'24-22-1-B', mel_ata:'24', mel_item:'22', mel_sub:'1', mel_point:'B', interval_fh:'0', interval_dy:'5', deadline: addDays(T, 5), signature:'MccPab26', reply_solution:'Part on order, P/N 24-22-REL-07. ETA 3 days.', reply_station:'BRU', reply_date:'', reply_sig:'' },
    { id:3, hil_number:'HIL-630294', ata:'29-11', title:'Green Hydraulic Pump – Case Drain Temp Trend', description:'GREEN HYD LO PR transient in cruise (1,950 psi / 4 min, spontaneous recovery). Green hydraulic pump case drain temperature trending upward: 10-sector avg 71°C, last three sectors 74-76-78°C (limit 85°C). No fault codes, no delta-P abnormality, no fluid loss. Assessed as early pump wear, not structural.', aircraft_reg:'EC-NMR', atl_wo_ref:'ATL-294017', reason:'Within AMM limits (78°C vs 85°C). No corroborating fault. Not a release blocker. Monitoring per Engineering instruction rather than immediate pump replacement.', mel_cat:'C', mel_ref:'29-11-ENG-MON', mel_ata:'29', mel_item:'11', mel_sub:'0', mel_point:'A', interval_fh:'0', interval_dy:'10', deadline: addDays(T, 10), signature:'MccPab26', reply_solution:'Monitor case drain temp trend. Borescope + load test scheduled at next A-check per Engineering monitoring instruction.', reply_station:'LPA', reply_date:T, reply_sig:'MccPab26' },
    { id:4, hil_number:'HIL-448120', ata:'22-20', title:'Yaw Damper Computer – Channel Fault', description:'YAW DAMPER FAULT ECAM latched in cruise FL180; YD would not re-arm after recycle. TSM 22-20-00 BITE confirmed a genuine YD computer channel fault (rate-gyro input fail), not a nuisance trip. Dutch-roll damping lost with YD off; mild Dutch-roll tendency reported by crew. Cannot be restored at line.', aircraft_reg:'EI-GUO', atl_wo_ref:'ATL-715388', reason:'Genuine YD channel failure, not restorable at line. Dispatch permitted with Yaw Damper inoperative per MEL 22-20-01 (Cat C) under operational conditions: crew briefed on loss of Dutch-roll damping and manual rudder coordination, moderate or greater turbulence avoided where practicable, autopilot remains available for normal ops.', mel_cat:'C', mel_ref:'22-20-01-A', mel_ata:'22', mel_item:'20', mel_sub:'01', mel_point:'A', interval_fh:'0', interval_dy:'10', deadline: addDays(T, 10), signature:'MccPab26', reply_solution:'YD computer (P/N 22-20-YDC) on order; replacement scheduled at LPA/BRU base within MEL interval. YD selected OFF and collared, INOP placard fitted.', reply_station:'LPA', reply_date:'', reply_sig:'' },
  ],
  historial: [
    // EI-HAG (5)
    { id:1, aircraft_reg:'EI-HAG', date:'2024-07-03', ata:'71-00', title:'Engine #1 Compressor Stall – Chip Detect', defect:'Engine #1 chip detect light illuminated during climb. P2.5 sensor showed EGT spike to 825°C (limit 810°C).', corrective_action:'Engine #1 borescope per EMM 72-30-00. Found two compressor stage 4 blades with minor erosion, within serviceable limits. Cleaned P2.5 sensor port. Drained oil, inspected filter: metallic particles found (ferrous), count 12 per 100 cc (limit 15). Engine test cell run performed. Parameters: EGT 780°C, N1 100.1%, Ng 101.3% – all within limits. CRS issued.', manual_ref:'EMM 72-30-00 Rev 22 / AMM 79-00-10 Rev 8 / PWEC SB 72-0045 Rev 4', release:'CRS issued. Engine cleared for return to service per EMM 72-30-00. EASA Part-66 B1.1 certifying staff. EASA.145.0419.', status:'closed' },
    { id:2, aircraft_reg:'EI-HAG', date:'2024-05-11', ata:'27-11', title:'Elevator Control System – Runaway Trim', defect:'Intermittent "ELEV TRIM RUNAWAY" ECAM. Trim moved uncommanded during cruise FL230.', corrective_action:'Tested pitch trim control system per AMM 27-41-00. Pitch trim module (PTM) self-test revealed fault code F-04: dual channel comparison error. Replaced PTM P/N 27-41-PTM-01 s/n 1182 per AMM 27-41-12. Carried out ground functional test: all 4 modes normal. Carried out flight test. No recurrence.', manual_ref:'AMM 27-41-00 Rev 11 / AMM 27-41-12 Rev 9 / TSM 27-41 FAULT F-04', release:'CRS issued per AMM 27-41-12. Aircraft returned to service. EASA.145.0419.', status:'closed' },
    { id:3, aircraft_reg:'EI-HAG', date:'2024-03-18', ata:'29-10', title:'Hydraulic System Leak – Blue Circuit', defect:'Blue hydraulic system pressure loss: 140 bar to 0 in 12 min after engine start.', corrective_action:'Traced leak to HP filter assembly housing crack (fatigue) per AMM 29-10-08. Replaced filter housing P/N HYD-2910-H with new P/N HYD-2910-H Rev B. System recharged to 175 bar with Aeroshell 41. Full system functional test: all actuators, NLG, brakes – satisfactory. No leaks after 30 min ground run.', manual_ref:'AMM 29-10-08 Rev 14 / CMM 29-10-12 Rev 6 / SB ATR29-033', release:'CRS issued per AMM 29-10-08 Rev 14. EASA.145.0419.', status:'closed' },
    { id:4, aircraft_reg:'EI-HAG', date:'2024-01-29', ata:'56-11', title:'Windshield LH – Crack (FOD)', defect:'Crew reported crack in LH windshield inner ply, approx 38 mm length, star pattern. FOD impact suspected.', corrective_action:'Assessed crack per SSM 56-11-01. Inner ply crack exceeds dispatching limit (max 30 mm linear). Windshield removed and replaced P/N ATR56-11-WS-LH per AMM 56-11-04. Installed using room-temperature cure sealant PR-1826. Cure time 24h. Structural check and leak test satisfactory.', manual_ref:'AMM 56-11-04 Rev 6 / SSM 56-11-01 Rev 5 / PR-1826 Mixing Instructions', release:'CRS issued per AMM 56-11-04. Aircraft returned to service. EASA.145.0419.', status:'closed' },
    { id:5, aircraft_reg:'EI-HAG', date:'2023-11-07', ata:'49-11', title:'APU Bleed Valve – Stuck Closed', defect:'APU BLEED NOT AVAIL ECAM on ground power-up. APU started normally, bleed not available for air conditioning.', corrective_action:'Tested APU bleed system per AMM 49-11-12. Bleed valve actuator found seized (mechanical jam, thread seized). Removed actuator P/N APU4911-ACT per AMM 49-11-14. Replaced with s/n 00723. APU pneumatic test: bleed pressure 35 PSI (min 30 PSI) – satisfactory. ECAM advisory clear.', manual_ref:'AMM 49-11-12 Rev 10 / AMM 49-11-14 Rev 10 / APU CMM 49-11-00 Rev 18', release:'CRS issued per AMM 49-11-14. Aircraft serviceable. EASA.145.0419.', status:'closed' },
    // EI-HAB (5)
    { id:6, aircraft_reg:'EI-HAB', date:'2024-08-15', ata:'32-51', title:'MLG RH – Oleo Strut Low Pressure', defect:'RH MLG oleo fully bottomed during towing. Pressure found 0 PSI (nominal 900 PSI per AMM).', corrective_action:'Serviced RH MLG strut per AMM 32-51-04. Found Schrader valve core cracked. Replaced valve core. Dry nitrogen charged to 900 PSI per servicing chart (460 kg aircraft weight). Extension check: 58 mm (min 50 mm per AMM). Oil level checked and replenished to upper sight glass (added 0.15 L MIL-H-5606).', manual_ref:'AMM 32-51-04 Rev 17 / AMM 32-51-00 Rev 17 (Servicing Chart)', release:'CRS issued per AMM 32-51-04. Aircraft returned to service. EASA.145.0419.', status:'closed' },
    { id:7, aircraft_reg:'EI-HAB', date:'2024-06-21', ata:'34-42', title:'WXR Antenna – Degraded Tilt Mechanism', defect:'Weather radar tilt servo not responding to cockpit input. Antenna stuck at 0° elevation.', corrective_action:'Tested WXR system per AMM 34-42-10. Tilt servo motor P/N 34-42-SRV tested: motor spins but no output torque (stripped internal gear). Replaced servo motor per AMM 34-42-14. Calibration performed per Rockwell Collins 880 MAINT MAN Section 6. Tilt range: -15° to +15° – satisfactory.', manual_ref:'AMM 34-42-14 Rev 9 / Rockwell Collins WXR-880 Maintenance Manual Sec 6', release:'CRS issued per AMM 34-42-14. Avionics release per CAME. EASA.145.0419.', status:'closed' },
    { id:8, aircraft_reg:'EI-HAB', date:'2024-04-05', ata:'36-11', title:'Bleed Air Duct – Leak (Engine #2 Side)', defect:'Hot air smell in cabin. BLEED DUCT LEAK ECAM advisory on climb.', corrective_action:'Isolated bleed system per AMM 36-11-00. Found bleed air flexible duct segment cracked at engine #2 outlet per AMM 36-11-08 inspection procedure. Replaced flexible duct segment P/N BLD-3611-F2 s/n 0387 per AMM 36-11-12. Duct leak check at 50 PSI: no leak. Engine run: ECAM clear.', manual_ref:'AMM 36-11-08 Rev 12 / AMM 36-11-12 Rev 12 / SB ATR36-028', release:'CRS issued per AMM 36-11-12. Aircraft serviceable. EASA.145.0419.', status:'closed' },
    { id:9, aircraft_reg:'EI-HAB', date:'2024-02-13', ata:'31-61', title:'DFDR – Download Error / Failure Flag', defect:'DFDR FAIL message on ECAM. OPS reported download failed. Required for audit by CAA.', corrective_action:'Tested DFDR per AMM 31-61-10. BITE: read/write head error, P/N DFD-3161-H. Removed unit per AMM 31-61-12. Installed loaner unit s/n L-0041. Full function test: 6h recording then playback – all parameters recorded correctly. Original unit sent to L3 Technologies for repair.', manual_ref:'AMM 31-61-10 Rev 8 / AMM 31-61-12 Rev 8 / L3 CVDR CMM 31-10-XX', release:'CRS issued per AMM 31-61-12. Aircraft DFDR operative. EASA.145.0419.', status:'closed' },
    { id:10, aircraft_reg:'EI-HAB', date:'2023-12-01', ata:'30-21', title:'Wing De-Ice Boots – Partial Failure LH', defect:'LH wing inner de-ice boot not inflating. Ice protection INOP for inner section.', corrective_action:'Tested de-ice system per AMM 30-21-00. Pneumatic distributor valve P/N 30-21-DV failed to open for inner boot circuit. Replaced valve per AMM 30-21-08. System test: sequencing 3→1→2 normal. Boot inflation: 18 PSI at all sections – within limits. ECAM clear.', manual_ref:'AMM 30-21-00 Rev 15 / AMM 30-21-08 Rev 15 / SIL ATR30-005', release:'CRS issued per AMM 30-21-08. Aircraft returned to service. EASA.145.0419.', status:'closed' },
    // EI-GUO (5)

document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('login-btn');
  btn.addEventListener('click', doLogin);
  btn.addEventListener('touchend', function(e) { e.preventDefault(); doLogin(); });
});

function doLogin() {
  var u = document.getElementById('inp-user').value.trim();
  var p = document.getElementById('inp-pass').value;
  if (u === 'Pabmcc26' && p === 'Mcc26') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    var av = document.getElementById('app-ver'); if (av) av.textContent = APP_VERSION;
    startClock();
    showView('dashboard');
  } else {
    var err = document.getElementById('login-error');
    err.style.display = 'block';
    setTimeout(function(){ err.style.display='none'; }, 3000);
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});
function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
}

// ═══════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════
function startClock() {
  function tick() {
    const now = new Date(Date.now() + 3600000);
    const d = now.toUTCString().replace(' GMT','');
    document.getElementById('clock').textContent = d.split(' ').slice(1,5).join(' ') + ' LT+1';
  }
  tick(); setInterval(tick, 1000);
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function showView(view) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  const content = document.getElementById('content');
  switch(view) {
    case 'dashboard': content.innerHTML = renderDashboard(); bindDashNotes(); break;
    case 'aircraft':  content.innerHTML = renderAircraft(); break;
    case 'wo':        content.innerHTML = renderWO(); break;
    case 'atl':       content.innerHTML = renderATL(); break;
    case 'hil':       content.innerHTML = renderHIL(); break;
    case 'historial': content.innerHTML = renderHistorial(); break;
    case 'contacts':  content.innerHTML = renderContacts(); break;
    case 'email':     content.innerHTML = renderEmail(); break;
    case 'reports':   content.innerHTML = renderReports(); bindReports(); break;
    case 'scheduler': content.innerHTML = renderScheduler(); bindScheduler(); break;
  }
}

function renderDashboard() {
  const aogAC = db.aircraft.filter(a => a.status === 'AOG');
  const hilUrgent = db.hil.filter(h => {
    if (h.status === 'closed') return false;
    const days = Math.ceil((new Date(h.deadline) - new Date(T)) / 86400000);
    return days <= 5 && days >= 0;
  });
  const woOpen = db.wo.filter(w => w.status === 'open');
  const atlRecent = [...db.atl].sort((a,b)=>b.id-a.id).slice(0,5);

  let aogHTML = aogAC.length ? aogAC.map(a => `
    <div class="dash-item aog-item" onclick="showView('aircraft')">
      <div class="dash-item-reg">${a.registration}</div>
      <div class="dash-item-title">${a.aircraft_type}</div>
      <div class="dash-item-meta">Status: AOG</div>
    </div>`).join('') : '<div class="empty-state">No AOG aircraft</div>';

  let hilHTML = hilUrgent.length ? hilUrgent.map(h => {
    const days = Math.ceil((new Date(h.deadline) - new Date(T)) / 86400000);
    const cls = days <= 3 ? 'deadline-urgent' : 'deadline-warn';
    return `<div class="dash-item hil-item" onclick="showView('hil');setTimeout(()=>openHILDetail(${h.id}),50)">
      <div class="dash-item-reg">${h.aircraft_reg}</div>
      <div class="dash-item-title">${h.title}</div>
      <div class="dash-item-meta">${h.hil_number} · <span class="${cls}">${days}d remaining</span></div>
    </div>`;}).join('') : '<div class="empty-state">No HIL items due soon</div>';

  let woHTML = woOpen.length ? woOpen.map(w => `
    <div class="dash-item wo-item" onclick="showView('wo');setTimeout(()=>openWODetail(${w.id}),50)">
      <div class="dash-item-reg">${w.aircraft_reg}</div>
      <div class="dash-item-title">${w.title}</div>
      <div class="dash-item-meta">WO ${w.wo_number} · ATA ${w.ata}</div>
    </div>`).join('') : '<div class="empty-state">No open work orders</div>';

  let atlHTML = atlRecent.length ? atlRecent.map(a => `
    <div class="dash-item atl-item" onclick="showView('atl');setTimeout(()=>openATLDetail(${a.id}),50)">
      <div class="dash-item-reg">${a.aircraft_reg}</div>
      <div class="dash-item-title">${a.atl_number}</div>
      <div class="dash-item-meta">${a.created_at} · ${a.status}</div>
    </div>`).join('') : '<div class="empty-state">No ATL entries</div>';

  return `
  <div class="module-header">
    <div>
      <div class="module-title">Operations Overview</div>
      <div class="module-subtitle">${new Date().toDateString()} · ATR 72-600 Fleet</div>
    </div>
  </div>
  <div class="dashboard-grid">
    <div class="dash-card aog">
      <div class="dash-card-header">
        <span class="dash-card-title">AOG</span>
        <span class="dash-badge badge-danger">${aogAC.length}</span>
      </div>
      ${aogHTML}
    </div>
    <div class="dash-card hil">
      <div class="dash-card-header">
        <span class="dash-card-title">HIL – Due Soon</span>
        <span class="dash-badge badge-diff">${hilUrgent.length}</span>
      </div>
      ${hilHTML}
    </div>
    <div class="dash-card wo">
      <div class="dash-card-header">
        <span class="dash-card-title">Work Orders Open</span>
        <span class="dash-badge badge-warn">${woOpen.length}</span>
      </div>
      ${woHTML}
    </div>
    <div class="dash-card atl">
      <div class="dash-card-header">
        <span class="dash-card-title">ATL – Recent</span>
        <span class="dash-badge badge-blue">${atlRecent.length}</span>
      </div>
      ${atlHTML}
    </div>
    <div class="dash-card notes" style="grid-column:span 2">
      <div class="dash-card-header">
        <span class="dash-card-title">Shift Relay / Annotations / Queries</span>
        <span class="dash-badge badge-success">Notes</span>
      </div>
      <textarea class="notes-area" id="notesArea" placeholder="Enter shift relay notes, queries or annotations here...">${db.notes}</textarea>
      <button class="btn-save-note" onclick="saveNotes()">💾 Save Notes</button>
    </div>
  </div>`;
}

function saveAircraft(id) {
  const data = {
    registration: document.getElementById('f-reg').value,
    msn: document.getElementById('f-msn').value,
    aircraft_type: document.getElementById('f-type').value,
    operator: document.getElementById('f-op').value,
    status: document.getElementById('f-sta').value,
    total_hours: document.getElementById('f-th').value,
    total_cycles: document.getElementById('f-tc').value,
  };
  if (id) { Object.assign(db.aircraft.find(a=>a.id===id), data); }
  else { db.aircraft.push({id:uid('aircraft'), ...data}); }
  closeModal(); showView('aircraft'); showToast('Aircraft saved', 'success');
}

let swReg = null;
(function registerSW() {
  try {
    if (!('serviceWorker' in navigator)) return;
    // A Service Worker only works (and only registers without error) when the page is
    // served over https, or http on localhost. In any other context - file://, about:blank,
    // blob:, an srcdoc/preview pane - registration is invalid, so skip it cleanly.
    var httpOK = location.protocol === 'https:' ||
      (location.protocol === 'http:' && (location.hostname === 'localhost' || location.hostname === '127.0.0.1'));
    if (!httpOK) {
      console.log('SW skipped: needs the https site or localhost. Notifications use the deployed PWA.');
      return;
    }
    // Relative script URL: register() resolves it against the page base, so it maps to
    // .../service-worker.js at whatever path the app is served from. No new URL() needed
    // (that throws on non-resolvable bases like about:blank).
    var doRegister = function () {
      navigator.serviceWorker.register('service-worker.js')
        .then(function (reg) { swReg = reg; console.log('SW registered:', reg.scope); })
        .catch(function (e) { console.log('SW registration failed:', (e && e.message) ? e.message : e); });
    };
    if (document.readyState === 'complete') doRegister();
    else window.addEventListener('load', doRegister, { once: true });
  } catch (e) {
    console.log('SW registration skipped:', (e && e.message) ? e.message : e);
  }
})();

// Build a ringtone using Web Audio API (no external file needed)
function playRingtone(durationMs) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const start = audioCtx.currentTime;
    // Classic two-tone ring: 440Hz + 480Hz, 2s on / 1s off pattern (US/EU style)
    let t = start;
    const cycles = Math.ceil(durationMs / 3000);
    for (let c = 0; c < cycles; c++) {
      [440, 480].forEach(freq => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.25, t + 0.05);
        gain.gain.setValueAtTime(0.25, t + 1.9);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 2.0);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 2.0);
      });
      t += 3.0; // 2s ring + 1s silence
    }
    // Vibration on supported devices
    if (navigator.vibrate) {
      const pattern = [];
      for (let c = 0; c < cycles; c++) pattern.push(1900, 1100);
      navigator.vibrate(pattern);
    }
  } catch(e) { console.log('Audio error', e); }
}

function stopRingtone() {
  if (audioCtx) { try { audioCtx.close(); } catch(e){} audioCtx = null; }
  if (navigator.vibrate) navigator.vibrate(0);
}

function renderScheduler() {
  const rows = schedules.length ? schedules.map((s,i) => `
    <tr>
      <td><b>${s.time}</b></td>
      <td>${s.title}</td>
      <td>${s.body}</td>
      <td>${s.sound?'🔊 Yes':'—'}</td>
      <td><span class="status-tag ${s.fired?'s-closed':'s-open'}">${s.fired?'Sent':'Pending'}</span></td>
      <td style="white-space:nowrap">
        <button class="btn-sm btn-view" onclick="testCall(${i})">Test</button>
        <button class="btn-sm btn-del" onclick="deleteSchedule(${i})">Del</button>
      </td>
    </tr>`).join('') :
    '<tr><td colspan="6" style="text-align:center;color:var(--asl-grey);padding:20px">No notifications scheduled</td></tr>';

  return `
  <div class="module-header">
    <div>
      <div class="module-title">🔔 Notification Scheduler</div>
      <div class="module-subtitle">Call-style notifications with sound for your iPhone lock screen</div>
    </div>
    <button class="btn-primary" id="sch-arm-btn">▶ Arm Schedule</button>
  </div>

  <div class="detail-section" style="margin-bottom:20px">

    <div style="font-size:12px;line-height:1.8;color:var(--asl-grey)">
      1. Open in Safari on iPhone → Share → <b style="color:var(--asl-white)">Add to Home Screen</b><br>
      2. Open the app from the home-screen icon, tap <b style="color:var(--asl-accent)">Allow</b> notifications<br>
      3. Press <b style="color:var(--asl-accent)">Arm Schedule</b> once (this unlocks sound — browsers require a tap first)<br>
      4. Keep the app open in the foreground for the ringtone to play at the scheduled time
    </div>
  </div>

  <div class="callout-box" style="background:rgba(232,160,32,.08);border-left:3px solid var(--asl-accent);padding:12px 16px;border-radius:0 8px 8px 0;margin-bottom:20px;font-size:12px;color:var(--asl-grey)">
    <b style="color:var(--asl-white)">Note:</b> The lock-screen banner appears even if the app is closed. The <b>ringtone sound</b> only plays while the app is open in the foreground — iOS blocks background audio from web apps.
  </div>

  <div class="dash-card" style="margin-bottom:20px">
    <div class="dash-card-header"><span class="dash-card-title">New Notification</span></div>
    <div class="form-grid" style="margin-bottom:14px">
      <div class="form-group">
        <label>Time</label>
        <input type="time" id="sch-time">
      </div>
      <div class="form-group">
        <label>Title (e.g. 📞 Incoming call — Jerry)</label>
        <input type="text" id="sch-title" placeholder="📞 Incoming call — Jerry">
      </div>
      <div class="form-group">
        <label>Message (optional)</label>
        <input type="text" id="sch-body" placeholder="tap to answer">
      </div>
      <div class="form-group">
        <label>Sound</label>
        <select id="sch-sound"><option value="yes">🔊 Ringtone</option><option value="no">Silent</option></select>
      </div>
    </div>
    <button class="btn-primary" id="sch-add-btn">+ Add Notification</button>
    <div id="notif-permission" style="margin-top:12px;font-size:12px;color:var(--asl-grey)"></div>
  </div>

  <div style="overflow-x:auto">
  <table class="data-table">
    <thead><tr><th>Time</th><th>Title</th><th>Message</th><th>Sound</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody id="sch-rows">${rows}</tbody>
  </table></div>`;
}

function bindScheduler() {
  document.getElementById('sch-add-btn').addEventListener('click', addSchedule);
  document.getElementById('sch-arm-btn').addEventListener('click', armSchedule);
  checkNotifPermission();
}

// Test a call immediately (also unlocks audio on first user tap)
function testCall(i) {
  const s = schedules[i];
  if (s.sound) playRingtone(9000); // ring for 9 seconds
  if ('Notification' in window && Notification.permission === 'granted') {
    if (swReg) swReg.showNotification(s.title, { body: s.body, icon: './ASL_icon.png', vibrate:[1900,1100,1900,1100], requireInteraction:true, tag:'asl-test' });
    else new Notification(s.title, { body: s.body, icon: './ASL_icon.png' });
  }
  showToast('Test call ringing…', 'success');
}

// Arm all pending schedules
function armSchedule() {
  // First tap unlocks the AudioContext for later programmatic playback
  try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state==='suspended') audioCtx.resume(); } catch(e){}
  let armed = 0;
  const now = new Date();
  schedules.forEach((s, idx) => {
    if (s.fired) return;
    const [h, m] = s.time.split(':').map(Number);
    const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
    if (target <= now) target.setDate(target.getDate() + 1);
    const delay = target - now;
    // Lock-screen banner via SW (works in background)
    if (swReg && Notification.permission === 'granted') {
      swReg.active && swReg.active.postMessage({ type:'SCHEDULE', title:s.title, body:s.body, delay });
    }
    // Sound via foreground timer
    schedTimers.push(setTimeout(() => {
      if (s.sound) playRingtone(9000);
      if (!swReg && 'Notification' in window && Notification.permission==='granted') {
        new Notification(s.title, { body:s.body, icon:'./ASL_icon.png' });
      }
      s.fired = true;
      if (document.querySelector('.nav-item.active')?.dataset.view === 'scheduler') showView('scheduler');
    }, delay));
    armed++;
  });
  showToast(`${armed} notification(s) armed`, 'success');
}

function checkNotifPermission() {
  const el = document.getElementById('notif-permission');
  if (!el) return;
  if (!('Notification' in window)) {
    el.innerHTML = '<span style="color:var(--asl-danger)">⚠ Notifications not supported. Use Safari and add to Home Screen.</span>';
    return;
  }
  if (Notification.permission === 'granted') {
    el.innerHTML = '<span style="color:var(--asl-success)">✔ Notifications enabled — press Arm Schedule to start</span>';
  } else if (Notification.permission === 'denied') {
    el.innerHTML = '<span style="color:var(--asl-danger)">✘ Notifications blocked. Enable in iPhone Settings → Apps → ASL.</span>';
  } else {
    el.innerHTML = '<span style="color:var(--asl-warn)">⚠ Permission needed. <button class="btn-sm btn-edit" onclick="requestNotifPermission()">Enable Notifications</button></span>';
  }
}

function requestNotifPermission() {
  Notification.requestPermission().then(p => {
    checkNotifPermission();
    if (p === 'granted') showToast('Notifications enabled!', 'success');
  });
}

function addSchedule() {
  const time = document.getElementById('sch-time').value;
  const title = document.getElementById('sch-title').value.trim();
  const body = document.getElementById('sch-body').value.trim() || 'tap to answer';
  const sound = document.getElementById('sch-sound').value === 'yes';

  if (!time) { showToast('Select a time', 'error'); return; }
  if (!title) { showToast('Enter a title', 'error'); return; }

  schedules.push({ time, title, body, fired:false, sound });
  showToast('Added — press Arm Schedule to activate', 'success');
  showView('scheduler');
}

function deleteSchedule(i) {
  schedules.splice(i, 1);
  showView('scheduler');
  showToast('Deleted', 'success');
}
